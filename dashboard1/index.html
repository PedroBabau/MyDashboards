<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoPulse | Dashboard Geolocalização</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a2a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 15px 20px;
            color: white;
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-family: monospace;
        }
        
        .info-panel h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: #66ffcc;
        }
        
        .data-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 8px;
        }
        
        .data-item {
            flex: 1;
            min-width: 150px;
        }
        
        .data-label {
            font-size: 10px;
            color: #aaa;
            letter-spacing: 1px;
        }
        
        .data-value {
            font-size: 14px;
            font-weight: bold;
            color: #ffaa66;
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.9);
            padding: 20px 40px;
            border-radius: 30px;
            z-index: 100;
            font-family: monospace;
            pointer-events: none;
            font-size: 14px;
            letter-spacing: 2px;
            text-align: center;
        }
        
        .retry-btn {
            position: fixed;
            bottom: 120px;
            right: 20px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 8px 16px;
            font-family: monospace;
            cursor: pointer;
            z-index: 20;
            font-size: 11px;
            pointer-events: auto;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <div class="info-panel" id="infoPanel">
        <h3>🌍 GEOPULSE | Sua Localização no Mundo</h3>
        <div class="data-row">
            <div class="data-item">
                <div class="data-label">📍 País</div>
                <div class="data-value" id="countryName">Carregando...</div>
            </div>
            <div class="data-item">
                <div class="data-label">🏙️ Cidade</div>
                <div class="data-value" id="cityName">Carregando...</div>
            </div>
            <div class="data-item">
                <div class="data-label">🌐 Endereço IP</div>
                <div class="data-value" id="ipAddress">---</div>
            </div>
            <div class="data-item">
                <div class="data-label">🗺️ Coordenadas</div>
                <div class="data-value" id="coordinates">---</div>
            </div>
            <div class="data-item">
                <div class="data-label">⏰ Fuso Horário</div>
                <div class="data-value" id="timezoneInfo">Carregando...</div>
            </div>
        </div>
    </div>
    <div id="loading" class="loading">🌍 LOCALIZANDO...<br><span style="font-size:10px;">Aguarde alguns segundos</span></div>
    <button id="retryBtn" class="retry-btn" style="display:none;">🔄 Tentar Novamente</button>
    <script src="/dashboard1/sketch.js"></script>
</body>
</html>
