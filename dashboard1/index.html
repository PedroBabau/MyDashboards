<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoPulse | Dashboard Geolocalização</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a2a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 15px 20px;
            color: white;
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-family: monospace;
        }
        
        .info-panel h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: #66ffcc;
        }
        
        .data-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 8px;
        }
        
        .data-item {
            flex: 1;
            min-width: 150px;
        }
        
        .data-label {
            font-size: 10px;
            color: #aaa;
            letter-spacing: 1px;
        }
        
        .data-value {
            font-size: 14px;
            font-weight: bold;
            color: #ffaa66;
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.9);
            padding: 20px 40px;
            border-radius: 30px;
            z-index: 100;
            font-family: monospace;
            pointer-events: none;
            font-size: 14px;
            letter-spacing: 2px;
            text-align: center;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Botão Home */
        .btn-home {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 24px;
            border-radius: 30px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 1px;
        }

        .btn-home:hover {
            background: rgba(100, 150, 255, 0.3);
            border-color: #66ffcc;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 200, 255, 0.2);
        }

        .btn-home::before {
            content: "←";
            font-size: 18px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <a href="../index.html" class="btn-home">INÍCIO</a>

    <div class="info-panel" id="infoPanel">
        <h3>🌍 GEOPULSE | Sua Localização no Mundo</h3>
        <div class="data-row">
            <div class="data-item">
                <div class="data-label">📍 País</div>
                <div class="data-value" id="countryName">Carregando...</div>
            </div>
            <div class="data-item">
                <div class="data-label">🏙️ Cidade</div>
                <div class="data-value" id="cityName">Carregando...</div>
            </div>
            <div class="data-item">
                <div class="data-label">🌐 Endereço IP</div>
                <div class="data-value" id="ipAddress">---</div>
            </div>
            <div class="data-item">
                <div class="data-label">🗺️ Coordenadas</div>
                <div class="data-value" id="coordinates">---</div>
            </div>
            <div class="data-item">
                <div class="data-label">⏰ Fuso Horário</div>
                <div class="data-value" id="timezoneInfo">Carregando...</div>
            </div>
        </div>
    </div>
    <div id="loading" class="loading">🌍 LOCALIZANDO...<br><span style="font-size:10px;">Aguarde alguns segundos</span></div>
    
    <script>
        let locationData = {
            country: "Carregando...",
            city: "Carregando...",
            ip: "Carregando...",
            latitude: 0,
            longitude: 0,
            timezone: "Carregando..."
        };

        let particles = [];
        let stars = [];
        let globeRotation = 0;
        let pulseIntensity = 0;
        let mainColorHue = 200;
        let dataLoaded = false;

        function setup() {
            createCanvas(windowWidth, windowHeight, WEBGL);
            colorMode(HSB, 360, 100, 100, 100);
            
            // Criar estrelas de fundo
            for (let i = 0; i < 400; i++) {
                stars.push({
                    x: random(-width/2, width/2),
                    y: random(-height/2, height/2),
                    z: random(-200, 200),
                    radius: random(1, 3)
                });
            }
            
            // Criar partículas
            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: random(width),
                    y: random(height),
                    vx: random(-0.3, 0.3),
                    vy: random(-0.3, 0.3),
                    size: random(2, 5),
                    life: random(100)
                });
            }
            
            fetchLocationData();
        }

        async function fetchLocationData() {
            try {
                let response = await fetch('https://ipapi.co/json/');
                
                if (!response.ok) throw new Error('HTTP ' + response.status);
                
                let data = await response.json();
                
                if (data && data.country_name) {
                    locationData.country = data.country_name || "Desconhecido";
                    locationData.city = data.city || "Desconhecida";
                    locationData.ip = data.ip || "0.0.0.0";
                    locationData.latitude = data.latitude || 0;
                    locationData.longitude = data.longitude || 0;
                    locationData.timezone = data.timezone || "Desconhecido";
                    
                    let hueFromLat = abs(locationData.latitude * 3.6) % 360;
                    let hueFromLong = abs(locationData.longitude * 2.4) % 360;
                    mainColorHue = (hueFromLat + hueFromLong) / 2;
                    if (isNaN(mainColorHue)) mainColorHue = 200;
                    
                    dataLoaded = true;
                    
                    let loadingDiv = select('#loading');
                    if (loadingDiv) {
                        loadingDiv.style('opacity', '0');
                        setTimeout(() => {
                            if (loadingDiv) loadingDiv.style('display', 'none');
                        }, 1000);
                    }
                    
                    updateInfoPanel();
                } else {
                    throw new Error('Dados inválidos');
                }
            } catch (error) {
                console.error('Erro:', error);
                locationData.country = "Portugal (Demo)";
                locationData.city = "Lisboa";
                locationData.ip = "192.168.1.1";
                locationData.latitude = 38.7223;
                locationData.longitude = -9.1393;
                locationData.timezone = "Europe/Lisbon";
                dataLoaded = true;
                
                let loadingDiv = select('#loading');
                if (loadingDiv) {
                    loadingDiv.html('⚠️ MODO DEMO<br><span style="font-size:10px;">Usando dados de exemplo</span>');
                    setTimeout(() => {
                        if (loadingDiv) loadingDiv.style('display', 'none');
                    }, 2000);
                }
                
                updateInfoPanel();
            }
        }

        function updateInfoPanel() {
            let panel = select('#infoPanel');
            if (panel) {
                select('#countryName').html(locationData.country);
                select('#cityName').html(locationData.city);
                select('#ipAddress').html(locationData.ip);
                select('#coordinates').html(`${Math.abs(locationData.latitude).toFixed(2)}° ${locationData.latitude >= 0 ? 'N' : 'S'} | ${Math.abs(locationData.longitude).toFixed(2)}° ${locationData.longitude >= 0 ? 'E' : 'W'}`);
                select('#timezoneInfo').html(locationData.timezone);
            }
        }

        function draw() {
            background(0, 0, 5);
            
            // Estrelas
            push();
            for (let star of stars) {
                push();
                translate(star.x, star.y, star.z);
                let twinkle = 50 + 30 * sin(millis() * 0.001 + star.x);
                fill(60, 20, twinkle);
                noStroke();
                sphere(star.radius);
                pop();
            }
            pop();
            
            let latIntensity = min(1, abs(locationData.latitude) / 90);
            pulseIntensity = 0.5 + latIntensity * 0.5;
            
            push();
            rotateY(globeRotation);
            globeRotation += 0.003;
            
            let globeRadius = min(width, height) * 0.18;
            
            strokeWeight(1.5);
            for (let i = 0; i <= 24; i++) {
                let lon = map(i, 0, 24, -PI, PI);
                let x1 = cos(lon) * globeRadius;
                let z1 = sin(lon) * globeRadius;
                stroke(mainColorHue, 70, 80, 60);
                line(x1, -globeRadius, z1, x1, globeRadius, z1);
            }
            
            for (let i = -5; i <= 5; i++) {
                let lat = map(i, -5, 5, -globeRadius, globeRadius);
                let r = sqrt(max(0, globeRadius * globeRadius - lat * lat));
                stroke(mainColorHue, 70, 80, 40);
                ellipse(0, lat, r * 2, 3);
            }
            
            noFill();
            strokeWeight(2);
            stroke(mainColorHue, 80, 90, 80);
            sphere(globeRadius);
            
            if (locationData.latitude !== 0 && locationData.longitude !== 0) {
                let latRad = radians(locationData.latitude);
                let lonRad = radians(locationData.longitude);
                
                let xPoint = globeRadius * cos(latRad) * cos(lonRad);
                let zPoint = globeRadius * cos(latRad) * sin(lonRad);
                let yPoint = globeRadius * sin(latRad);
                
                push();
                translate(xPoint, yPoint, zPoint);
                fill(0, 100, 100);
                noStroke();
                sphere(6);
                
                let pulseSize = 8 + sin(millis() * 0.008) * 3;
                noFill();
                stroke(0, 100, 100, 80);
                strokeWeight(1.5);
                sphere(pulseSize);
                pop();
            }
            
            pop();
            
            for (let p of particles) {
                p.vx += random(-0.03, 0.03);
                p.vy += random(-0.03, 0.03);
                p.vx = constrain(p.vx, -0.5, 0.5);
                p.vy = constrain(p.vy, -0.5, 0.5);
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.3;
                
                if (p.x < -50) p.x = width + 50;
                if (p.x > width + 50) p.x = -50;
                if (p.y < -50) p.y = height + 50;
                if (p.y > height + 50) p.y = -50;
                
                if (p.life <= 0) {
                    p.x = random(width);
                    p.y = random(height);
                    p.life = 100;
                    p.size = random(2, 6);
                }
                
                let particleHue = (mainColorHue + p.size * 20) % 360;
                fill(particleHue, 60, 70, 40);
                noStroke();
                circle(p.x - width/2, p.y - height/2, p.size);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
