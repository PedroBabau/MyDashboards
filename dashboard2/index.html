<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Gallery | Imagens de Carros + Filtros</title>
    <style>
        * {
            user-select: none;
        }
        
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0a0a1a, #1a1a2e, #16213e);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            max-width: 1400px;
            width: 100%;
            justify-content: center;
        }
        
        .canvas-area {
            flex: 1.2;
            min-width: 450px;
            text-align: center;
        }
        
        canvas {
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            background: #0f0f1a;
            cursor: pointer;
        }
        
        .controls {
            flex: 1;
            min-width: 320px;
            background: rgba(15, 25, 45, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: fit-content;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .controls h2 {
            margin: 0 0 5px 0;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .controls p {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #cbd5e1;
        }
        
        select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        
        button {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
        }
        
        .filter-section {
            border-top: 1px solid #334155;
            padding-top: 20px;
            margin-top: 10px;
        }
        
        .filter-section h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: #ff6b6b;
        }
        
        .filter-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .filter-btn {
            background: #334155;
            padding: 8px;
            font-size: 12px;
            margin-bottom: 0;
        }
        
        .filter-btn:hover {
            background: #475569;
            transform: none;
        }
        
        input[type="range"] {
            width: 100%;
            padding: 0;
            margin: 10px 0;
        }
        
        .value-display {
            display: inline-block;
            background: #1e293b;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
            margin-left: 8px;
        }
        
        .status {
            background: #0f172a;
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
            color: #94a3b8;
        }
        
        .status.loading {
            color: #fbbf24;
            animation: pulse 1s infinite;
        }
        
        .status.success {
            color: #4ade80;
        }
        
        .status.error {
            color: #f87171;
        }
        
        .car-info {
            background: #1e293b;
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
            font-size: 12px;
            border-left: 3px solid #ff6b6b;
            text-align: center;
        }
        
        .car-info span {
            color: #ffaa66;
            font-weight: bold;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ff6b6b;
            border-radius: 3px;
        }
        
        @media (max-width: 900px) {
            .canvas-area { min-width: 350px; }
            canvas { width: 100%; height: auto; }
            .controls { min-width: 280px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="canvas-area">
            <div id="p5canvas"></div>
        </div>
        <div class="controls">
            <h2>🏎️ Car Gallery</h2>
            <p>Imagens de Carros por Marca + Filtros interativos</p>
            
            <div class="input-group">
                <label>🚗 Marca do Carro</label>
                <select id="brand">
                    <option value="audi">Audi R8</option>
                    <option value="bmw">BMW M4</option>
                    <option value="ferrari">Ferrari F8 Tributo</option>
                    <option value="lamborghini">Lamborghini Huracán</option>
                    <option value="porsche">Porsche 911</option>
                    <option value="mercedes">Mercedes-AMG GT</option>
                    <option value="tesla">Tesla Model S</option>
                    <option value="ford">Ford Mustang GT</option>
                </select>
            </div>
            
            <button id="fetchBtn">🔍 Buscar Imagem do Carro</button>
            
            <div class="car-info" id="carInfo">
                <span>🏎️ Marca selecionada:</span> <span id="selectedBrand">Audi R8</span><br>
                <span>📸</span> Clique em "Buscar Imagem" para carregar
            </div>
            
            <div class="filter-section">
                <h3>🎛️ Pós-Processamento Interativo</h3>
                <div class="filter-buttons">
                    <button class="filter-btn" data-filter="pixelate">Pixelate</button>
                    <button class="filter-btn" data-filter="glitch">Glitch Art</button>
                    <button class="filter-btn" data-filter="invert">Inverter Cores</button>
                    <button class="filter-btn" data-filter="threshold">Limiar (B&W)</button>
                    <button class="filter-btn" data-filter="emboss">Relevo</button>
                    <button class="filter-btn" data-filter="edges">Detecção Bordas</button>
                    <button class="filter-btn" data-filter="reset">Resetar</button>
                </div>
                
                <div class="input-group">
                    <label>🌀 Distorção Radial <span id="radialVal" class="value-display">0</span></label>
                    <input type="range" id="radialDistort" min="0" max="100" value="0" step="1">
                </div>
                
                <div class="input-group">
                    <label>🌈 Saturação <span id="satVal" class="value-display">100%</span></label>
                    <input type="range" id="saturation" min="0" max="200" value="100" step="1">
                </div>
                
                <div class="input-group">
                    <label>🔆 Brilho <span id="brightVal" class="value-display">0</span></label>
                    <input type="range" id="brightness" min="-100" max="100" value="0" step="1">
                </div>
            </div>
            
            <div class="status" id="status">
                💡 Selecione uma marca e clique em "Buscar Imagem do Carro"!
            </div>
        </div>
    </div>
    
    <script>
        let currentImage = null;
        let originalPixels = null;
        let currentFilter = 'none';
        let radialAmount = 0;
        let saturationAmount = 100;
        let brightnessAmount = 0;
        let currentBrand = "audi";
        
        // URLs de imagens de carros (CDN - imagens diretas e confiáveis)
        // Usei imagens do CDN do Unsplash (diretas, sem CORS)
        const carImagesDirect = {
            audi: "https://images.unsplash.com/photo-1614200187524-dc4b892acf16?w=500&h=400&fit=crop",
            bmw: "https://images.unsplash.com/photo-1555215695-3004980ad54e?w=500&h=400&fit=crop",
            ferrari: "https://images.unsplash.com/photo-1592198084033-aade902d1aae?w=500&h=400&fit=crop",
            lamborghini: "https://images.unsplash.com/photo-1621135802920-133df287f89c?w=500&h=400&fit=crop",
            porsche: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=500&h=400&fit=crop",
            mercedes: "https://images.unsplash.com/photo-1618843479313-40f8afb4b4d1?w=500&h=400&fit=crop",
            tesla: "https://images.unsplash.com/photo-1560958089-b8a1929cea89?w=500&h=400&fit=crop",
            ford: "https://images.unsplash.com/photo-1580939583459-5e4f7d6ea5b6?w=500&h=400&fit=crop"
        };
        
        // Fallback SVG (caso as imagens não carreguem)
        function getFallbackSVG(brand) {
            const colors = {
                audi: { main: "#0066cc", text: "AUDI" },
                bmw: { main: "#0066aa", text: "BMW" },
                ferrari: { main: "#ff3300", text: "FERRARI" },
                lamborghini: { main: "#ffcc00", text: "LAMBORGHINI" },
                porsche: { main: "#00aa66", text: "PORSCHE" },
                mercedes: { main: "#888888", text: "MERCEDES" },
                tesla: { main: "#666666", text: "TESLA" },
                ford: { main: "#0044aa", text: "FORD" }
            };
            let c = colors[brand] || { main: "#ff6600", text: brand.toUpperCase() };
            return `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 500 400'%3E%3Crect width='500' height='400' fill='%231a2a4a'/%3E%3Crect x='80' y='120' width='340' height='100' rx='15' fill='${c.main.replace('#', '%23')}'/%3E%3Crect x='150' y='90' width='200' height='50' rx='8' fill='${c.main.replace('#', '%23')}cc'/%3E%3Ccircle cx='160' cy='240' r='35' fill='%23222222'/%3E%3Ccircle cx='340' cy='240' r='35' fill='%23222222'/%3E%3Ctext x='250' y='180' text-anchor='middle' fill='white' font-size='28' font-family='monospace' font-weight='bold'%3E${c.text}%3C/text%3E%3C/svg%3E`;
        }
        
        function setup() {
            let canvas = createCanvas(500, 400);
            canvas.parent('p5canvas');
            background(20);
            
            textAlign(CENTER, CENTER);
            fill(150);
            textSize(14);
            text("🏎️ Selecione uma marca\n e clique em 'Buscar Imagem'", width/2, height/2);
            
            // Event listeners
            let fetchBtn = select('#fetchBtn');
            fetchBtn.mousePressed(() => {
                fetchCarImage();
            });
            
            // Atualizar o texto da marca quando o select mudar
            let brandSelect = select('#brand');
            brandSelect.changed(() => {
                let selectedText = brandSelect.options[brandSelect.selectedIndex].text;
                select('#selectedBrand').html(selectedText);
                currentBrand = brandSelect.value();
            });
            
            // Inicializar o texto da marca
            select('#selectedBrand').html(select('#brand').options[select('#brand').selectedIndex].text);
            currentBrand = select('#brand').value();
            
            // Filtros
            selectAll('.filter-btn').forEach(btn => {
                btn.mousePressed(() => {
                    currentFilter = btn.elt.dataset.filter;
                    if (currentFilter === 'reset') {
                        resetImage();
                    } else {
                        applyFilters();
                    }
                });
            });
            
            select('#radialDistort').input(() => {
                radialAmount = int(select('#radialDistort').value());
                select('#radialVal').html(radialAmount);
                applyFilters();
            });
            
            select('#saturation').input(() => {
                saturationAmount = int(select('#saturation').value());
                select('#satVal').html(saturationAmount + '%');
                applyFilters();
            });
            
            select('#brightness').input(() => {
                brightnessAmount = int(select('#brightness').value());
                select('#brightVal').html(brightnessAmount);
                applyFilters();
            });
        }
        
        function fetchCarImage() {
            let statusDiv = select('#status');
            let brand = currentBrand;
            let brandName = select('#brand').options[select('#brand').selectedIndex].text;
            
            // Atualizar texto da marca selecionada
            select('#selectedBrand').html(brandName);
            
            statusDiv.html('🏎️ Buscando imagem... ⏳');
            statusDiv.removeClass('success').removeClass('error').addClass('loading');
            
            let imageUrl = carImagesDirect[brand];
            
            if (!imageUrl) {
                loadFallbackImage(brand, statusDiv);
                return;
            }
            
            // Tentar carregar a imagem
            loadImage(imageUrl, 
                (img) => {
                    displayImage(img, statusDiv);
                },
                (err) => {
                    console.log('Erro ao carregar imagem direta, usando fallback:', err);
                    loadFallbackImage(brand, statusDiv);
                }
            );
        }
        
        function loadFallbackImage(brand, statusDiv) {
            let fallbackUrl = getFallbackSVG(brand);
            loadImage(fallbackUrl, 
                (img) => {
                    displayImage(img, statusDiv);
                    statusDiv.html('⚠️ Modo Demo - Imagem SVG de fallback');
                },
                (err2) => {
                    statusDiv.html('❌ Erro ao carregar imagem. Tente novamente.');
                    statusDiv.removeClass('loading').addClass('error');
                    
                    // Desenhar mensagem de erro no canvas
                    background(20);
                    fill(150);
                    textSize(14);
                    text("❌ Erro ao carregar imagem\nTente novamente mais tarde", width/2, height/2);
                }
            );
        }
        
        function displayImage(img, statusDiv) {
            currentImage = img;
            
            // Redimensionar para o canvas
            if (currentImage.width !== width || currentImage.height !== height) {
                currentImage.resize(width, height);
            }
            
            currentImage.loadPixels();
            originalPixels = [...currentImage.pixels];
            
            statusDiv.html('✅ Imagem carregada! Use os filtros abaixo.');
            statusDiv.removeClass('loading').addClass('success');
            
            // Resetar efeitos
            currentFilter = 'none';
            radialAmount = 0;
            saturationAmount = 100;
            brightnessAmount = 0;
            select('#radialDistort').value(0);
            select('#saturation').value(100);
            select('#brightness').value(0);
            select('#radialVal').html('0');
            select('#satVal').html('100%');
            select('#brightVal').html('0');
            
            // Desenhar a imagem com o carro decorativo
            drawImageWithDecoration();
        }
        
        function drawImageWithDecoration() {
            if (!currentImage) return;
            
            // Criar um buffer
            let buffer = createGraphics(width, height);
            
            // Desenhar a imagem do carro
            buffer.image(currentImage, 0, 0, width, height);
            
            // Desenhar o carro decorativo no canto inferior direito
            drawDecorativeCar(buffer);
            
            // Atualizar a imagem principal
            currentImage = buffer.get();
            currentImage.loadPixels();
            originalPixels = [...currentImage.pixels];
            image(currentImage, 0, 0);
        }
        
        function drawDecorativeCar(g) {
            g.push();
            
            // Posição: canto inferior direito
            let carX = g.width - 130;
            let carY = g.height - 90;
            
            // Sombra
            g.fill(0, 0, 0, 100);
            g.noStroke();
            g.ellipse(carX + 45, carY + 30, 90, 12);
            
            // Corpo principal
            g.fill(255, 80, 40);
            g.rect(carX, carY, 90, 35, 8);
            
            // Teto
            g.fill(220, 60, 30);
            g.rect(carX + 20, carY - 12, 45, 18, 6);
            
            // Janelas
            g.fill(100, 150, 200, 200);
            g.rect(carX + 25, carY - 10, 15, 10, 3);
            g.rect(carX + 45, carY - 10, 15, 10, 3);
            
            // Rodas
            g.fill(30, 30, 30);
            g.ellipse(carX + 22, carY + 30, 22, 22);
            g.ellipse(carX + 68, carY + 30, 22, 22);
            g.fill(70, 70, 80);
            g.ellipse(carX + 22, carY + 30, 12, 12);
            g.ellipse(carX + 68, carY + 30, 12, 12);
            
            // Faróis
            g.fill(255, 255, 180);
            g.ellipse(carX + 85, carY + 18, 9, 7);
            g.fill(255, 100, 50);
            g.ellipse(carX + 5, carY + 18, 9, 7);
            
            // Spoiler
            g.fill(200, 60, 30);
            g.rect(carX + 15, carY - 18, 55, 5, 2);
            
            // Emblema
            g.fill(255, 215, 0);
            g.ellipse(carX + 45, carY + 18, 10, 10);
            g.fill(0);
            g.ellipse(carX + 45, carY + 18, 4, 4);
            
            g.pop();
        }
        
        function resetImage() {
            if (!originalPixels || !currentImage) return;
            
            currentImage.loadPixels();
            for (let i = 0; i < originalPixels.length; i++) {
                currentImage.pixels[i] = originalPixels[i];
            }
            currentImage.updatePixels();
            image(currentImage, 0, 0);
            
            radialAmount = 0;
            saturationAmount = 100;
            brightnessAmount = 0;
            currentFilter = 'none';
            select('#radialDistort').value(0);
            select('#saturation').value(100);
            select('#brightness').value(0);
            select('#radialVal').html('0');
            select('#satVal').html('100%');
            select('#brightVal').html('0');
        }
        
        function applyFilters() {
            if (!currentImage || !originalPixels) return;
            
            currentImage.loadPixels();
            for (let i = 0; i < originalPixels.length; i++) {
                currentImage.pixels[i] = originalPixels[i];
            }
            
            if (currentFilter !== 'none') {
                applyPixelFilter();
            }
            
            applyColorAdjustments();
            
            if (radialAmount > 0) {
                applyRadialDistortion();
            }
            
            currentImage.updatePixels();
            image(currentImage, 0, 0);
        }
        
        function applyPixelFilter() {
            currentImage.loadPixels();
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    let idx = (y * width + x) * 4;
                    let r = currentImage.pixels[idx];
                    let g = currentImage.pixels[idx + 1];
                    let b = currentImage.pixels[idx + 2];
                    
                    switch(currentFilter) {
                        case 'pixelate':
                            let pixelSize = 8;
                            let px = floor(x / pixelSize) * pixelSize;
                            let py = floor(y / pixelSize) * pixelSize;
                            let pIdx = (py * width + px) * 4;
                            currentImage.pixels[idx] = currentImage.pixels[pIdx];
                            currentImage.pixels[idx + 1] = currentImage.pixels[pIdx + 1];
                            currentImage.pixels[idx + 2] = currentImage.pixels[pIdx + 2];
                            break;
                            
                        case 'glitch':
                            if (random(1) < 0.05) {
                                let offset = int(random(-20, 20));
                                let newIdx = idx + offset * 4;
                                if (newIdx >= 0 && newIdx < currentImage.pixels.length - 3) {
                                    currentImage.pixels[idx] = currentImage.pixels[newIdx];
                                    currentImage.pixels[idx + 1] = currentImage.pixels[newIdx + 1];
                                    currentImage.pixels[idx + 2] = currentImage.pixels[newIdx + 2];
                                }
                            }
                            break;
                            
                        case 'invert':
                            currentImage.pixels[idx] = 255 - r;
                            currentImage.pixels[idx + 1] = 255 - g;
                            currentImage.pixels[idx + 2] = 255 - b;
                            break;
                            
                        case 'threshold':
                            let gray = (r + g + b) / 3;
                            let val = gray > 127 ? 255 : 0;
                            currentImage.pixels[idx] = val;
                            currentImage.pixels[idx + 1] = val;
                            currentImage.pixels[idx + 2] = val;
                            break;
                            
                        case 'emboss':
                            if (x > 0 && y > 0) {
                                let prevIdx = ((y-1) * width + (x-1)) * 4;
                                let dr = r - currentImage.pixels[prevIdx];
                                let dg = g - currentImage.pixels[prevIdx + 1];
                                let db = b - currentImage.pixels[prevIdx + 2];
                                currentImage.pixels[idx] = constrain(128 + dr, 0, 255);
                                currentImage.pixels[idx + 1] = constrain(128 + dg, 0, 255);
                                currentImage.pixels[idx + 2] = constrain(128 + db, 0, 255);
                            }
                            break;
                            
                        case 'edges':
                            if (x > 0 && x < width-1 && y > 0 && y < height-1) {
                                let rightIdx = (y * width + (x+1)) * 4;
                                let bottomIdx = ((y+1) * width + x) * 4;
                                let edgeR = abs(r - currentImage.pixels[rightIdx]) + abs(r - currentImage.pixels[bottomIdx]);
                                let edgeG = abs(g - currentImage.pixels[rightIdx+1]) + abs(g - currentImage.pixels[bottomIdx+1]);
                                let edgeB = abs(b - currentImage.pixels[rightIdx+2]) + abs(b - currentImage.pixels[bottomIdx+2]);
                                let edge = constrain((edgeR + edgeG + edgeB) / 3, 0, 255);
                                currentImage.pixels[idx] = edge;
                                currentImage.pixels[idx+1] = edge;
                                currentImage.pixels[idx+2] = edge;
                            }
                            break;
                    }
                }
            }
            currentImage.updatePixels();
        }
        
        function applyColorAdjustments() {
            currentImage.loadPixels();
            
            for (let i = 0; i < currentImage.pixels.length; i += 4) {
                let r = currentImage.pixels[i];
                let g = currentImage.pixels[i + 1];
                let b = currentImage.pixels[i + 2];
                
                let gray = (r + g + b) / 3;
                let satFactor = saturationAmount / 100;
                let newR = gray + (r - gray) * satFactor;
                let newG = gray + (g - gray) * satFactor;
                let newB = gray + (b - gray) * satFactor;
                
                currentImage.pixels[i] = constrain(newR + brightnessAmount, 0, 255);
                currentImage.pixels[i + 1] = constrain(newG + brightnessAmount, 0, 255);
                currentImage.pixels[i + 2] = constrain(newB + brightnessAmount, 0, 255);
            }
            currentImage.updatePixels();
        }
        
        function applyRadialDistortion() {
            if (radialAmount === 0) return;
            
            currentImage.loadPixels();
            let distorted = new Array(currentImage.pixels.length);
            let centerX = width / 2;
            let centerY = height / 2;
            let maxRadius = dist(0, 0, centerX, centerY);
            let strength = radialAmount / 50;
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    let dx = x - centerX;
                    let dy = y - centerY;
                    let radius = dist(x, y, centerX, centerY);
                    
                    let factor = 1 + strength * (radius / maxRadius);
                    let newX = centerX + dx * factor;
                    let newY = centerY + dy * factor;
                    
                    let srcX = floor(newX);
                    let srcY = floor(newY);
                    
                    if (srcX >= 0 && srcX < width && srcY >= 0 && srcY < height) {
                        let srcIdx = (srcY * width + srcX) * 4;
                        let dstIdx = (y * width + x) * 4;
                        distorted[dstIdx] = currentImage.pixels[srcIdx];
                        distorted[dstIdx + 1] = currentImage.pixels[srcIdx + 1];
                        distorted[dstIdx + 2] = currentImage.pixels[srcIdx + 2];
                    }
                }
            }
            
            for (let i = 0; i < distorted.length; i++) {
                if (distorted[i] !== undefined) currentImage.pixels[i] = distorted[i];
            }
            currentImage.updatePixels();
        }
        
        function draw() {
            // O desenho é feito nos callbacks
        }
    </script>
