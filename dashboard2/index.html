<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Gallery | Fotos Aleatórias de Carros</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0a0a1a, #1a1a2e);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            max-width: 1100px;
            width: 100%;
        }
        
        canvas {
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            background: #1a1a2e;
        }
        
        .controls {
            flex: 1;
            min-width: 280px;
            background: rgba(15,25,45,0.95);
            border-radius: 20px;
            padding: 20px;
            color: white;
        }
        
        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            font-weight: bold;
            font-size: 16px;
            margin: 10px 0;
            cursor: pointer;
        }
        
        button:hover {
            transform: translateY(-2px);
            transition: 0.2s;
        }
        
        .filter-btn {
            background: #334155;
            margin: 5px;
            width: auto;
            display: inline-block;
            padding: 8px 12px;
            font-size: 12px;
            border-radius: 8px;
            border: none;
            color: white;
            cursor: pointer;
        }
        
        .filter-btn:hover {
            background: #475569;
        }
        
        .filter-group {
            text-align: center;
            margin: 15px 0;
        }
        
        input[type="range"] {
            width: 100%;
            margin: 10px 0;
            cursor: pointer;
        }
        
        .status {
            background: #0f172a;
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
            text-align: center;
            font-size: 12px;
        }
        
        .status-success { color: #4ade80; }
        .status-error { color: #f87171; }
        .status-loading { color: #fbbf24; }
        .status-default { color: #94a3b8; }
        
        h2 {
            margin: 0 0 5px 0;
        }
        
        p {
            color: #94a3b8;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <div class="container">
        <div id="canvasContainer"></div>
        <div class="controls">
            <h2>🏎️ Car Gallery</h2>
            <p>Fotos aleatórias de carros desportivos</p>
            
            <button id="randomBtn">🎲 NOVO CARRO ALEATÓRIO</button>
            
            <div class="filter-group">
                <button class="filter-btn" data-filter="pixelate">Pixelate</button>
                <button class="filter-btn" data-filter="glitch">Glitch</button>
                <button class="filter-btn" data-filter="invert">Inverter</button>
                <button class="filter-btn" data-filter="threshold">B&W</button>
                <button class="filter-btn" data-filter="emboss">Relevo</button>
                <button class="filter-btn" data-filter="edges">Bordas</button>
                <button class="filter-btn" data-filter="reset">Reset</button>
            </div>
            
            <label>🌀 Distorção Radial: <span id="radialVal">0</span></label>
            <input type="range" id="radialSlider" min="0" max="100" value="0" step="1">
            
            <label>🌈 Saturação: <span id="satVal">100</span>%</label>
            <input type="range" id="satSlider" min="0" max="200" value="100" step="1">
            
            <label>🔆 Brilho: <span id="brightVal">0</span></label>
            <input type="range" id="brightSlider" min="-100" max="100" value="0" step="1">
            
            <div id="statusMsg" class="status-default">💡 Clique em "NOVO CARRO ALEATÓRIO"</div>
        </div>
    </div>

    <script>
        // ============================================
        // VARIÁVEIS
        // ============================================
        let img = null;
        let originalPixels = null;
        let currentFilter = 'none';
        let radialAmount = 0;
        let saturationAmount = 100;
        let brightnessAmount = 0;
        let canvasW = 600;
        let canvasH = 400;
        
        // URLs de imagens de carros (diretas e confiáveis)
        const carImages = [
            "https://images.pexels.com/photos/1255144/audi-car-audi-r8-audi-r8-plus-1255144.jpeg?w=600&h=400&fit=crop",
            "https://images.pexels.com/photos/290275/2015-bmw-m4-coupe-290275.jpeg?w=600&h=400&fit=crop",
            "https://images.pexels.com/photos/337909/ferrari-vehicle-sports-car-supercar-337909.jpeg?w=600&h=400&fit=crop",
            "https://images.pexels.com/photos/3802510/lamborghini-huracan-supercar-vehicle-3802510.jpeg?w=600&h=400&fit=crop",
            "https://images.pexels.com/photos/220133/porsche-911-car-sports-car-220133.jpeg?w=600&h=400&fit=crop",
            "https://images.pexels.com/photos/1130036/mercedes-amg-gt-vehicle-car-1130036.jpeg?w=600&h=400&fit=crop",
            "https://images.pexels.com/photos/1149017/audi-r8-sports-car-1149017.jpeg?w=600&h=400&fit=crop",
            "https://images.pexels.com/photos/120049/bmw-car-120049.jpeg?w=600&h=400&fit=crop",
            "https://images.pexels.com/photos/1032483/lamborghini-vehicle-sports-car-1032483.jpeg?w=600&h=400&fit=crop"
        ];
        
        // ============================================
        // SETUP
        // ============================================
        function setup() {
            let canvas = createCanvas(canvasW, canvasH);
            canvas.parent('canvasContainer');
            background(20);
            
            textAlign(CENTER, CENTER);
            fill(150);
            textSize(14);
            text("🏎️ Clique em NOVO CARRO ALEATÓRIO", width/2, height/2);
            
            // Botão
            let btn = select('#randomBtn');
            btn.mousePressed(loadRandomCar);
            
            // Filtros
            let filters = selectAll('.filter-btn');
            for (let f of filters) {
                f.mousePressed(() => {
                    let filterName = f.elt.dataset.filter;
                    if (filterName === 'reset') {
                        resetImage();
                    } else {
                        currentFilter = filterName;
                        applyFilters();
                    }
                });
            }
            
            // Sliders
            let radialSlider = select('#radialSlider');
            radialSlider.input(() => {
                radialAmount = int(radialSlider.value());
                select('#radialVal').html(radialAmount);
                applyFilters();
            });
            
            let satSlider = select('#satSlider');
            satSlider.input(() => {
                saturationAmount = int(satSlider.value());
                select('#satVal').html(saturationAmount);
                applyFilters();
            });
            
            let brightSlider = select('#brightSlider');
            brightSlider.input(() => {
                brightnessAmount = int(brightSlider.value());
                select('#brightVal').html(brightnessAmount);
                applyFilters();
            });
        }
        
        function setStatus(text, type) {
            let div = select('#statusMsg');
            div.html(text);
            div.removeClass('status-default status-success status-error status-loading');
            if (type === 'success') div.addClass('status-success');
            else if (type === 'error') div.addClass('status-error');
            else if (type === 'loading') div.addClass('status-loading');
            else div.addClass('status-default');
        }
        
        function loadRandomCar() {
            setStatus('⏳ A buscar carro...', 'loading');
            
            let randomIndex = floor(random(carImages.length));
            let imgUrl = carImages[randomIndex];
            
            loadImage(imgUrl, 
                (loadedImg) => {
                    img = loadedImg;
                    
                    if (img.width !== canvasW || img.height !== canvasH) {
                        img.resize(canvasW, canvasH);
                    }
                    
                    img.loadPixels();
                    originalPixels = [...img.pixels];
                    
                    setStatus('✅ Carro carregado! Use os filtros.', 'success');
                    
                    // Reset filtros
                    currentFilter = 'none';
                    radialAmount = 0;
                    saturationAmount = 100;
                    brightnessAmount = 0;
                    select('#radialSlider').value(0);
                    select('#satSlider').value(100);
                    select('#brightSlider').value(0);
                    select('#radialVal').html('0');
                    select('#satVal').html('100');
                    select('#brightVal').html('0');
                    
                    image(img, 0, 0);
                },
                (err) => {
                    console.error(err);
                    setStatus('❌ Erro ao carregar. Tente novamente.', 'error');
                    background(20);
                    textAlign(CENTER, CENTER);
                    fill(200);
                    text("❌ Erro ao carregar\nTente novamente", width/2, height/2);
                }
            );
        }
        
        function resetImage() {
            if (!originalPixels || !img) {
                setStatus('⚠️ Clique em NOVO CARRO primeiro', 'error');
                return;
            }
            
            img.loadPixels();
            for (let i = 0; i < originalPixels.length; i++) {
                img.pixels[i] = originalPixels[i];
            }
            img.updatePixels();
            image(img, 0, 0);
            
            currentFilter = 'none';
            radialAmount = 0;
            saturationAmount = 100;
            brightnessAmount = 0;
            select('#radialSlider').value(0);
            select('#satSlider').value(100);
            select('#brightSlider').value(0);
            select('#radialVal').html('0');
            select('#satVal').html('100');
            select('#brightVal').html('0');
            
            setStatus('🔄 Filtros resetados!', 'success');
        }
        
        function applyFilters() {
            if (!originalPixels || !img) return;
            
            img.loadPixels();
            for (let i = 0; i < originalPixels.length; i++) {
                img.pixels[i] = originalPixels[i];
            }
            
            if (currentFilter !== 'none') {
                applyPixelFilter();
            }
            
            applyColorAdjustments();
            
            if (radialAmount > 0) {
                applyRadialDistortion();
            }
            
            img.updatePixels();
            image(img, 0, 0);
        }
        
        function applyPixelFilter() {
            img.loadPixels();
            
            for (let y = 0; y < canvasH; y++) {
                for (let x = 0; x < canvasW; x++) {
                    let idx = (y * canvasW + x) * 4;
                    
                    if (currentFilter === 'pixelate') {
                        let pixelSize = 8;
                        let px = floor(x / pixelSize) * pixelSize;
                        let py = floor(y / pixelSize) * pixelSize;
                        let pIdx = (py * canvasW + px) * 4;
                        img.pixels[idx] = img.pixels[pIdx];
                        img.pixels[idx+1] = img.pixels[pIdx+1];
                        img.pixels[idx+2] = img.pixels[pIdx+2];
                    }
                    else if (currentFilter === 'glitch') {
                        if (random(1) < 0.05) {
                            let offset = int(random(-20, 20));
                            let newIdx = idx + offset * 4;
                            if (newIdx >= 0 && newIdx < img.pixels.length - 3) {
                                img.pixels[idx] = img.pixels[newIdx];
                                img.pixels[idx+1] = img.pixels[newIdx+1];
                                img.pixels[idx+2] = img.pixels[newIdx+2];
                            }
                        }
                    }
                    else if (currentFilter === 'invert') {
                        img.pixels[idx] = 255 - img.pixels[idx];
                        img.pixels[idx+1] = 255 - img.pixels[idx+1];
                        img.pixels[idx+2] = 255 - img.pixels[idx+2];
                    }
                    else if (currentFilter === 'threshold') {
                        let r = img.pixels[idx];
                        let g = img.pixels[idx+1];
                        let b = img.pixels[idx+2];
                        let gray = (r + g + b) / 3;
                        let val = gray > 127 ? 255 : 0;
                        img.pixels[idx] = val;
                        img.pixels[idx+1] = val;
                        img.pixels[idx+2] = val;
                    }
                    else if (currentFilter === 'emboss') {
                        if (x > 0 && y > 0) {
                            let prevIdx = ((y-1) * canvasW + (x-1)) * 4;
                            let dr = img.pixels[idx] - img.pixels[prevIdx];
                            let newVal = constrain(128 + dr, 0, 255);
                            img.pixels[idx] = newVal;
                            img.pixels[idx+1] = newVal;
                            img.pixels[idx+2] = newVal;
                        }
                    }
                    else if (currentFilter === 'edges') {
                        if (x > 0 && x < canvasW-1 && y > 0 && y < canvasH-1) {
                            let rightIdx = (y * canvasW + (x+1)) * 4;
                            let bottomIdx = ((y+1) * canvasW + x) * 4;
                            let edge = abs(img.pixels[idx] - img.pixels[rightIdx]) + abs(img.pixels[idx] - img.pixels[bottomIdx]);
                            edge = constrain(edge, 0, 255);
                            img.pixels[idx] = edge;
                            img.pixels[idx+1] = edge;
                            img.pixels[idx+2] = edge;
                        }
                    }
                }
            }
            img.updatePixels();
        }
        
        function applyColorAdjustments() {
            img.loadPixels();
            
            for (let i = 0; i < img.pixels.length; i += 4) {
                let r = img.pixels[i];
                let g = img.pixels[i + 1];
                let b = img.pixels[i + 2];
                
                let gray = (r + g + b) / 3;
                let satFactor = saturationAmount / 100;
                let newR = gray + (r - gray) * satFactor;
                let newG = gray + (g - gray) * satFactor;
                let newB = gray + (b - gray) * satFactor;
                
                img.pixels[i] = constrain(newR + brightnessAmount, 0, 255);
                img.pixels[i + 1] = constrain(newG + brightnessAmount, 0, 255);
                img.pixels[i + 2] = constrain(newB + brightnessAmount, 0, 255);
            }
            img.updatePixels();
        }
        
        function applyRadialDistortion() {
            let newPixels = new Array(img.pixels.length);
            let centerX = canvasW / 2;
            let centerY = canvasH / 2;
            let maxRadius = dist(0, 0, centerX, centerY);
            let strength = radialAmount / 50;
            
            for (let y = 0; y < canvasH; y++) {
                for (let x = 0; x < canvasW; x++) {
                    let dx = x - centerX;
                    let dy = y - centerY;
                    let radius = dist(x, y, centerX, centerY);
                    
                    let factor = 1 + strength * (radius / maxRadius);
                    let newX = centerX + dx * factor;
                    let newY = centerY + dy * factor;
                    
                    let srcX = floor(newX);
                    let srcY = floor(newY);
                    
                    if (srcX >= 0 && srcX < canvasW && srcY >= 0 && srcY < canvasH) {
                        let srcIdx = (srcY * canvasW + srcX) * 4;
                        let dstIdx = (y * canvasW + x) * 4;
                        newPixels[dstIdx] = img.pixels[srcIdx];
                        newPixels[dstIdx+1] = img.pixels[srcIdx+1];
                        newPixels[dstIdx+2] = img.pixels[srcIdx+2];
                    }
                }
            }
            
            for (let i = 0; i < newPixels.length; i++) {
                if (newPixels[i] !== undefined) img.pixels[i] = newPixels[i];
            }
            img.updatePixels();
        }
        
        function draw() {
            // nada
        }
    </script>
</body>
</html>
