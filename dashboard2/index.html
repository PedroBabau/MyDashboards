<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Gallery | Imagens de Carros</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0a0a1a, #1a1a2e);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            max-width: 1100px;
            width: 100%;
            justify-content: center;
        }
        
        .canvas-area {
            flex: 1.2;
            min-width: 450px;
        }
        
        canvas {
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            background: #1a1a2e;
        }
        
        .controls {
            flex: 1;
            min-width: 280px;
            background: rgba(15,25,45,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        h2 {
            margin: 0 0 5px 0;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        select, button {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            font-size: 14px;
            margin-bottom: 15px;
            cursor: pointer;
        }
        
        button {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            font-weight: bold;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .filter-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin: 15px 0;
        }
        
        .filter-btn {
            background: #334155;
            margin: 0;
            padding: 8px;
            font-size: 12px;
        }
        
        input[type="range"] {
            width: 100%;
            margin: 10px 0;
        }
        
        .status {
            background: #0f172a;
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
            text-align: center;
            font-size: 12px;
        }
        
        .status.loading { color: #fbbf24; }
        .status.success { color: #4ade80; }
        .status.error { color: #f87171; }
        
        .car-info {
            background: #1e293b;
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
            text-align: center;
            font-size: 12px;
            border-left: 3px solid #ff6b6b;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="canvas-area">
            <div id="p5canvas"></div>
        </div>
        <div class="controls">
            <h2>🏎️ Car Gallery</h2>
            <p>Imagens de Carros (CDN)</p>
            
            <select id="brandSelect">
                <option value="audi">Audi R8</option>
                <option value="bmw">BMW M4</option>
                <option value="ferrari">Ferrari F8</option>
                <option value="lamborghini">Lamborghini</option>
                <option value="porsche">Porsche 911</option>
                <option value="mercedes">Mercedes AMG</option>
            </select>
            
            <button id="loadBtn">🔍 Carregar Imagem</button>
            
            <div class="car-info">
                🏎️ Marca: <span id="brandName">Audi R8</span>
            </div>
            
            <div class="filter-buttons">
                <button class="filter-btn" data-filter="pixelate">Pixelate</button>
                <button class="filter-btn" data-filter="glitch">Glitch</button>
                <button class="filter-btn" data-filter="invert">Inverter</button>
                <button class="filter-btn" data-filter="threshold">B&W</button>
                <button class="filter-btn" data-filter="emboss">Relevo</button>
                <button class="filter-btn" data-filter="edges">Bordas</button>
                <button class="filter-btn" data-filter="reset">Reset</button>
            </div>
            
            <label>🌀 Distorção Radial: <span id="radialVal">0</span></label>
            <input type="range" id="radialSlider" min="0" max="100" value="0">
            
            <label>🌈 Saturação: <span id="satVal">100</span>%</label>
            <input type="range" id="satSlider" min="0" max="200" value="100">
            
            <label>🔆 Brilho: <span id="brightVal">0</span></label>
            <input type="range" id="brightSlider" min="-100" max="100" value="0">
            
            <div class="status" id="statusMsg">💡 Selecione uma marca e clique em Carregar</div>
        </div>
    </div>

    <script>
        // ============================================
        // VARIÁVEIS GLOBAIS
        // ============================================
        let currentImage = null;
        let originalPixels = null;
        let currentFilter = 'none';
        let radialAmount = 0;
        let saturationAmount = 100;
        let brightnessAmount = 0;
        
        // IMAGENS DE CARROS (CDN que funciona com p5.js)
        // Usando Cloudimage - URLs diretas e confiáveis
        const carImages = {
            audi: "https://images.pexels.com/photos/1255144/audi-car-audi-r8-audi-r8-plus-1255144.jpeg?w=500&h=400&fit=crop",
            bmw: "https://images.pexels.com/photos/290275/pexels-photo-290275.jpeg?w=500&h=400&fit=crop",
            ferrari: "https://images.pexels.com/photos/337909/ferrari-vehicle-sports-car-supercar-337909.jpeg?w=500&h=400&fit=crop",
            lamborghini: "https://images.pexels.com/photos/3802510/pexels-photo-3802510.jpeg?w=500&h=400&fit=crop",
            porsche: "https://images.pexels.com/photos/220133/pexels-photo-220133.jpeg?w=500&h=400&fit=crop",
            mercedes: "https://images.pexels.com/photos/1130036/pexels-photo-1130036.jpeg?w=500&h=400&fit=crop"
        };
        
        // ============================================
        // SETUP p5.js
        // ============================================
        function setup() {
            let canvas = createCanvas(500, 400);
            canvas.parent('p5canvas');
            background(20);
            
            textAlign(CENTER, CENTER);
            fill(200);
            textSize(14);
            text("🏎️ Selecione uma marca\n e clique em 'Carregar Imagem'", width/2, height/2);
            
            // Elementos DOM
            let loadBtn = select('#loadBtn');
            loadBtn.mousePressed(loadCarImage);
            
            let brandSelect = select('#brandSelect');
            brandSelect.changed(() => {
                let selectedText = brandSelect.options[brandSelect.selectedIndex].text;
                select('#brandName').html(selectedText);
            });
            
            // Filtros
            let filterBtns = selectAll('.filter-btn');
            for (let btn of filterBtns) {
                btn.mousePressed(() => {
                    let filter = btn.elt.dataset.filter;
                    if (filter === 'reset') {
                        resetToOriginal();
                    } else {
                        currentFilter = filter;
                        applyAllFilters();
                    }
                });
            }
            
            // Sliders
            let radialSlider = select('#radialSlider');
            radialSlider.input(() => {
                radialAmount = int(radialSlider.value());
                select('#radialVal').html(radialAmount);
                applyAllFilters();
            });
            
            let satSlider = select('#satSlider');
            satSlider.input(() => {
                saturationAmount = int(satSlider.value());
                select('#satVal').html(saturationAmount);
                applyAllFilters();
            });
            
            let brightSlider = select('#brightSlider');
            brightSlider.input(() => {
                brightnessAmount = int(brightSlider.value());
                select('#brightVal').html(brightnessAmount);
                applyAllFilters();
            });
        }
        
        // ============================================
        // CARREGAR IMAGEM
        // ============================================
        function loadCarImage() {
            let brand = select('#brandSelect').value();
            let statusDiv = select('#statusMsg');
            let imageUrl = carImages[brand];
            
            if (!imageUrl) {
                statusDiv.html('❌ Erro: Marca não encontrada');
                statusDiv.removeClass('success loading').addClass('error');
                return;
            }
            
            statusDiv.html('🖼️ A carregar imagem... ⏳');
            statusDiv.removeClass('success error').addClass('loading');
            
            // Usar setTimeout para dar feedback visual
            setTimeout(() => {
                loadImage(imageUrl, 
                    (img) => {
                        // Sucesso
                        currentImage = img;
                        
                        // Redimensionar para o canvas
                        if (currentImage.width !== width || currentImage.height !== height) {
                            currentImage.resize(width, height);
                        }
                        
                        // Guardar pixels originais
                        currentImage.loadPixels();
                        originalPixels = [...currentImage.pixels];
                        
                        statusDiv.html('✅ Imagem carregada com sucesso! Use os filtros.');
                        statusDiv.removeClass('loading').addClass('success');
                        
                        // Resetar todos os efeitos
                        resetEffects();
                        
                        // Mostrar imagem
                        image(currentImage, 0, 0);
                    },
                    (err) => {
                        // Erro
                        console.error('Erro ao carregar:', err);
                        statusDiv.html('❌ Erro ao carregar imagem. Tente novamente.');
                        statusDiv.removeClass('loading').addClass('error');
                        
                        background(20);
                        fill(200);
                        textSize(14);
                        text("❌ Erro ao carregar imagem\nVerifique sua internet", width/2, height/2);
                    }
                );
            }, 100);
        }
        
        // ============================================
        // RESETAR EFEITOS
        // ============================================
        function resetEffects() {
            currentFilter = 'none';
            radialAmount = 0;
            saturationAmount = 100;
            brightnessAmount = 0;
            
            select('#radialSlider').value(0);
            select('#satSlider').value(100);
            select('#brightSlider').value(0);
            select('#radialVal').html('0');
            select('#satVal').html('100');
            select('#brightVal').html('0');
        }
        
        // ============================================
        // RESETAR PARA IMAGEM ORIGINAL
        // ============================================
        function resetToOriginal() {
            if (!originalPixels || !currentImage) {
                console.log("Sem imagem para resetar");
                return;
            }
            
            currentImage.loadPixels();
            for (let i = 0; i < originalPixels.length; i++) {
                currentImage.pixels[i] = originalPixels[i];
            }
            currentImage.updatePixels();
            image(currentImage, 0, 0);
            
            resetEffects();
        }
        
        // ============================================
        // APLICAR TODOS OS FILTROS
        // ============================================
        function applyAllFilters() {
            if (!originalPixels || !currentImage) {
                console.log("Sem imagem para aplicar filtros");
                return;
            }
            
            // Começar com original
            currentImage.loadPixels();
            for (let i = 0; i < originalPixels.length; i++) {
                currentImage.pixels[i] = originalPixels[i];
            }
            
            // Aplicar filtro de pixel
            if (currentFilter !== 'none') {
                applyPixelFilter();
            }
            
            // Ajustes de cor
            applyColorAdjustments();
            
            // Distorção radial
            if (radialAmount > 0) {
                applyRadialDistortion();
            }
            
            currentImage.updatePixels();
            image(currentImage, 0, 0);
        }
        
        // ============================================
        // FILTRO DE PIXELS
        // ============================================
        function applyPixelFilter() {
            currentImage.loadPixels();
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    let idx = (y * width + x) * 4;
                    let r = currentImage.pixels[idx];
                    let g = currentImage.pixels[idx + 1];
                    let b = currentImage.pixels[idx + 2];
                    
                    switch(currentFilter) {
                        case 'pixelate':
                            let pixelSize = 8;
                            let px = floor(x / pixelSize) * pixelSize;
                            let py = floor(y / pixelSize) * pixelSize;
                            let pIdx = (py * width + px) * 4;
                            currentImage.pixels[idx] = currentImage.pixels[pIdx];
                            currentImage.pixels[idx+1] = currentImage.pixels[pIdx+1];
                            currentImage.pixels[idx+2] = currentImage.pixels[pIdx+2];
                            break;
                            
                        case 'glitch':
                            if (random(1) < 0.05) {
                                let offset = int(random(-20, 20));
                                let newIdx = idx + offset * 4;
                                if (newIdx >= 0 && newIdx < currentImage.pixels.length - 3) {
                                    currentImage.pixels[idx] = currentImage.pixels[newIdx];
                                    currentImage.pixels[idx+1] = currentImage.pixels[newIdx+1];
                                    currentImage.pixels[idx+2] = currentImage.pixels[newIdx+2];
                                }
                            }
                            break;
                            
                        case 'invert':
                            currentImage.pixels[idx] = 255 - r;
                            currentImage.pixels[idx+1] = 255 - g;
                            currentImage.pixels[idx+2] = 255 - b;
                            break;
                            
                        case 'threshold':
                            let gray = (r + g + b) / 3;
                            let val = gray > 127 ? 255 : 0;
                            currentImage.pixels[idx] = val;
                            currentImage.pixels[idx+1] = val;
                            currentImage.pixels[idx+2] = val;
                            break;
                            
                        case 'emboss':
                            if (x > 0 && y > 0) {
                                let prevIdx = ((y-1) * width + (x-1)) * 4;
                                let dr = r - currentImage.pixels[prevIdx];
                                let dg = g - currentImage.pixels[prevIdx+1];
                                let db = b - currentImage.pixels[prevIdx+2];
                                currentImage.pixels[idx] = constrain(128 + dr, 0, 255);
                                currentImage.pixels[idx+1] = constrain(128 + dg, 0, 255);
                                currentImage.pixels[idx+2] = constrain(128 + db, 0, 255);
                            }
                            break;
                            
                        case 'edges':
                            if (x > 0 && x < width-1 && y > 0 && y < height-1) {
                                let rightIdx = (y * width + (x+1)) * 4;
                                let bottomIdx = ((y+1) * width + x) * 4;
                                let edgeR = abs(r - currentImage.pixels[rightIdx]) + abs(r - currentImage.pixels[bottomIdx]);
                                let edgeG = abs(g - currentImage.pixels[rightIdx+1]) + abs(g - currentImage.pixels[bottomIdx+1]);
                                let edgeB = abs(b - currentImage.pixels[rightIdx+2]) + abs(b - currentImage.pixels[bottomIdx+2]);
                                let edge = constrain((edgeR + edgeG + edgeB) / 3, 0, 255);
                                currentImage.pixels[idx] = edge;
                                currentImage.pixels[idx+1] = edge;
                                currentImage.pixels[idx+2] = edge;
                            }
                            break;
                    }
                }
            }
            currentImage.updatePixels();
        }
        
        // ============================================
        // AJUSTES DE COR (SATURAÇÃO + BRILHO)
        // ============================================
        function applyColorAdjustments() {
            currentImage.loadPixels();
            
            for (let i = 0; i < currentImage.pixels.length; i += 4) {
                let r = currentImage.pixels[i];
                let g = currentImage.pixels[i + 1];
                let b = currentImage.pixels[i + 2];
                
                // Saturação
                let gray = (r + g + b) / 3;
                let satFactor = saturationAmount / 100;
                let newR = gray + (r - gray) * satFactor;
                let newG = gray + (g - gray) * satFactor;
                let newB = gray + (b - gray) * satFactor;
                
                // Brilho
                currentImage.pixels[i] = constrain(newR + brightnessAmount, 0, 255);
                currentImage.pixels[i + 1] = constrain(newG + brightnessAmount, 0, 255);
                currentImage.pixels[i + 2] = constrain(newB + brightnessAmount, 0, 255);
            }
            currentImage.updatePixels();
        }
        
        // ============================================
        // DISTORÇÃO RADIAL
        // ============================================
        function applyRadialDistortion() {
            if (radialAmount === 0) return;
            
            currentImage.loadPixels();
            let distorted = new Array(currentImage.pixels.length);
            let centerX = width / 2;
            let centerY = height / 2;
            let maxRadius = dist(0, 0, centerX, centerY);
            let strength = radialAmount / 50;
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    let dx = x - centerX;
                    let dy = y - centerY;
                    let radius = dist(x, y, centerX, centerY);
                    
                    let factor = 1 + strength * (radius / maxRadius);
                    let newX = centerX + dx * factor;
                    let newY = centerY + dy * factor;
                    
                    let srcX = floor(newX);
                    let srcY = floor(newY);
                    
                    if (srcX >= 0 && srcX < width && srcY >= 0 && srcY < height) {
                        let srcIdx = (srcY * width + srcX) * 4;
                        let dstIdx = (y * width + x) * 4;
                        distorted[dstIdx] = currentImage.pixels[srcIdx];
                        distorted[dstIdx+1] = currentImage.pixels[srcIdx+1];
                        distorted[dstIdx+2] = currentImage.pixels[srcIdx+2];
                        distorted[dstIdx+3] = currentImage.pixels[srcIdx+3];
                    }
                }
            }
            
            for (let i = 0; i < distorted.length; i++) {
                if (distorted[i] !== undefined) currentImage.pixels[i] = distorted[i];
            }
            currentImage.updatePixels();
        }
        
        function draw() {
            // Não é necessário fazer nada aqui
        }
    </script>
</body>
</html>
