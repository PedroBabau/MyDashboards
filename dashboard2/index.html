<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Gallery | Waifu.pics API</title>
    <style>
        * {
            user-select: none;
        }
        
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1a0a2e, #16213e, #0f3460);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1400px;
            width: 100%;
            justify-content: center;
        }
        
        .canvas-area {
            flex: 2;
            min-width: 500px;
            text-align: center;
        }
        
        canvas {
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            background: #0f0f1a;
            cursor: crosshair;
        }
        
        .controls {
            flex: 1;
            min-width: 320px;
            background: rgba(15, 25, 45, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: fit-content;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .controls h2 {
            margin: 0 0 5px 0;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .controls p {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #cbd5e1;
        }
        
        select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        
        button {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
        }
        
        .filter-section {
            border-top: 1px solid #334155;
            padding-top: 20px;
            margin-top: 10px;
        }
        
        .filter-section h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: #ff6b6b;
        }
        
        .filter-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .filter-btn {
            background: #334155;
            padding: 8px;
            font-size: 12px;
            margin-bottom: 0;
        }
        
        .filter-btn:hover {
            background: #475569;
            transform: none;
        }
        
        input[type="range"] {
            width: 100%;
            padding: 0;
            margin: 10px 0;
        }
        
        .value-display {
            display: inline-block;
            background: #1e293b;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
            margin-left: 8px;
        }
        
        .status {
            background: #0f172a;
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
            color: #94a3b8;
        }
        
        .status.loading {
            color: #fbbf24;
            animation: pulse 1s infinite;
        }
        
        .status.success {
            color: #4ade80;
        }
        
        .status.error {
            color: #f87171;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ff6b6b;
            border-radius: 3px;
        }
        
        @media (max-width: 900px) {
            .canvas-area { min-width: 300px; }
            canvas { width: 100%; height: auto; }
            .controls { min-width: 280px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="canvas-area">
            <div id="p5canvas"></div>
        </div>
        <div class="controls">
            <h2>🎨 Anime Gallery</h2>
            <p>Explore imagens de anime por categoria + Filtros interativos</p>
            
            <div class="input-group">
                <label>🎭 Categoria de Imagem</label>
                <select id="category">
                    <option value="waifu">Waifu (Personagem Feminina)</option>
                    <option value="neko">Neko (Garota Gato)</option>
                    <option value="shinobu">Shinobu</option>
                    <option value="megumin">Megumin</option>
                    <option value="bully">Bully</option>
                    <option value="cuddle">Cuddle (Abraço)</option>
                    <option value="cry">Cry (Choro)</option>
                    <option value="hug">Hug (Abraço)</option>
                    <option value="awoo">Awoo</option>
                    <option value="kiss">Kiss (Beijo)</option>
                    <option value="lick">Lick (Lamber)</option>
                    <option value="pat">Pat (Carinho)</option>
                    <option value="smug">Smug (Arrogante)</option>
                    <option value="highfive">High Five</option>
                    <option value="nom">Nom (Comendo)</option>
                    <option value="bite">Bite (Mordida)</option>
                </select>
            </div>
            
            <button id="fetchBtn">🎲 Buscar Imagem Aleatória</button>
            
            <div class="filter-section">
                <h3>🎛️ Pós-Processamento Interativo</h3>
                <div class="filter-buttons">
                    <button class="filter-btn" data-filter="pixelate">Pixelate</button>
                    <button class="filter-btn" data-filter="glitch">Glitch Art</button>
                    <button class="filter-btn" data-filter="invert">Inverter Cores</button>
                    <button class="filter-btn" data-filter="threshold">Limiar (B&W)</button>
                    <button class="filter-btn" data-filter="emboss">Relevo</button>
                    <button class="filter-btn" data-filter="edges">Detecção Bordas</button>
                    <button class="filter-btn" data-filter="reset">Resetar</button>
                </div>
                
                <div class="input-group">
                    <label>🌀 Distorção Radial <span id="radialVal" class="value-display">0</span></label>
                    <input type="range" id="radialDistort" min="0" max="100" value="0" step="1">
                </div>
                
                <div class="input-group">
                    <label>🌈 Saturação <span id="satVal" class="value-display">100%</span></label>
                    <input type="range" id="saturation" min="0" max="200" value="100" step="1">
                </div>
                
                <div class="input-group">
                    <label>🔆 Brilho <span id="brightVal" class="value-display">0</span></label>
                    <input type="range" id="brightness" min="-100" max="100" value="0" step="1">
                </div>
            </div>
            
            <div class="status" id="status">
                💡 Selecione uma categoria e clique em buscar!
            </div>
        </div>
    </div>
    <script src="/dashboard2/sketch.js"></script>
</body>
</html>
