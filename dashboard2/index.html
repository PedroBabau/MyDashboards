<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot | Chat com Robô</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a2a, #1a1a3e, #0f172a);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1300px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
        }
        
        .robot-area {
            flex: 1;
            min-width: 350px;
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .robot-canvas {
            background: #0f0f1a;
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        canvas {
            border-radius: 20px;
            display: block;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .robot-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }
        
        .status-led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .chat-area {
            flex: 1.5;
            min-width: 400px;
            background: rgba(15, 25, 45, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            height: 600px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .chat-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 30px 30px 0 0;
        }
        
        .chat-header h2 {
            color: white;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message.bot {
            justify-content: flex-start;
        }
        
        .message-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .message.user .message-avatar {
            background: #3b82f6;
            order: 2;
        }
        
        .message.bot .message-avatar {
            background: #8b5cf6;
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }
        
        .message.user .message-content {
            background: #3b82f6;
            color: white;
            border-radius: 18px 18px 4px 18px;
        }
        
        .message.bot .message-content {
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 18px 18px 18px 4px;
            border: 1px solid #334155;
        }
        
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 12px 16px;
            background: #1e293b;
            border-radius: 18px;
            width: fit-content;
            border: 1px solid #334155;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #94a3b8;
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-8px); opacity: 1; }
        }
        
        .chat-input-area {
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 12px;
        }
        
        .chat-input-area input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 25px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        
        .chat-input-area input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }
        
        .chat-input-area button {
            padding: 12px 24px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .chat-input-area button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }
        
        .clear-btn {
            background: #ef4444 !important;
        }
        
        .clear-btn:hover {
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4) !important;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 3px;
        }
        
        @media (max-width: 900px) {
            .robot-area { min-width: 300px; }
            .chat-area { min-width: 350px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="robot-area">
            <div class="robot-canvas">
                <div id="robotCanvas"></div>
            </div>
            <div class="robot-status">
                <div class="status-led"></div>
                <span style="color: #94a3b8; font-size: 12px;">IA Online | Modo Conversa</span>
            </div>
            <p style="color: #64748b; font-size: 11px; margin-top: 15px;">
                🤖 Robô desenhado com p5.js - Olhos e expressões reagem à conversa
            </p>
        </div>
        
        <div class="chat-area">
            <div class="chat-header">
                <h2>
                    <span>🤖</span> AI Assistant
                    <span style="font-size: 12px; font-weight: normal; margin-left: auto;">powered by SimpleBot API</span>
                </h2>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        Olá! Eu sou o Assistente IA. Como posso ajudar você hoje?<br>
                        <span style="font-size: 10px; color: #94a3b8;">Pergunte sobre tecnologia, programação, ou converse normalmente!</span>
                    </div>
                </div>
            </div>
            
            <div class="chat-input-area">
                <input type="text" id="messageInput" placeholder="Digite sua mensagem..." autocomplete="off">
                <button id="sendBtn">📤 Enviar</button>
                <button id="clearBtn" class="clear-btn">🗑️ Limpar</button>
            </div>
        </div>
    </div>

    <script>
        let eyeX = 0, eyeY = 0;
        let expression = "normal";
        let blinkTimer = 0;
        let isTyping = false;
        
        function setup() {
            let canvas = createCanvas(300, 300);
            canvas.parent('robotCanvas');
            
            let sendBtn = select('#sendBtn');
            let clearBtn = select('#clearBtn');
            let messageInput = select('#messageInput');
            
            sendBtn.mousePressed(sendMessage);
            clearBtn.mousePressed(clearChat);
            messageInput.elt.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
            
            setInterval(() => {
                if (expression !== "thinking") {
                    eyeX = random(-5, 5);
                    eyeY = random(-5, 5);
                }
            }, 3000);
            
            setInterval(() => {
                blinkTimer = 5;
            }, 4000);
        }
        
        function draw() {
            background(15, 15, 26);
            
            push();
            translate(width/2, height/2 - 20);
            
            fill(30, 41, 59);
            stroke(59, 130, 246);
            strokeWeight(2);
            rect(-60, 40, 120, 100, 15);
            
            fill(30, 41, 59);
            rect(-70, -60, 140, 120, 25);
            
            blinkTimer--;
            let eyeSize = 25;
            let eyeOpen = blinkTimer <= 0;
            
            fill(20, 30, 50);
            ellipse(-30, -25, eyeSize, eyeSize);
            fill(255);
            ellipse(-30 + eyeX, -25 + eyeY, 12, eyeOpen ? 12 : 2);
            fill(0);
            ellipse(-30 + eyeX, -25 + eyeY, 6, eyeOpen ? 6 : 2);
            
            fill(20, 30, 50);
            ellipse(30, -25, eyeSize, eyeSize);
            fill(255);
            ellipse(30 + eyeX, -25 + eyeY, 12, eyeOpen ? 12 : 2);
            fill(0);
            ellipse(30 + eyeX, -25 + eyeY, 6, eyeOpen ? 6 : 2);
            
            stroke(59, 130, 246);
            strokeWeight(3);
            noFill();
            
            if (expression === "happy") {
                arc(0, 10, 50, 30, 0, PI);
            } else if (expression === "sad") {
                arc(0, 10, 50, 30, PI, TWO_PI);
            } else if (expression === "thinking") {
                for (let x = -25; x <= 25; x += 5) {
                    point(x, 10 + sin(x * 0.5 + millis() * 0.01) * 5);
                }
            } else {
                line(-25, 10, 25, 10);
            }
            
            stroke(59, 130, 246);
            strokeWeight(3);
            line(-20, -60, -20, -85);
            line(20, -60, 20, -85);
            fill(59, 130, 246);
            noStroke();
            ellipse(-20, -90, 10, 10);
            ellipse(20, -90, 10, 10);
            
            if (isTyping || expression === "thinking") {
                fill(255, 200, 0);
                ellipse(-20, -90, 6, 6);
                ellipse(20, -90, 6, 6);
            } else {
                fill(59, 130, 246);
                ellipse(-20, -90, 6, 6);
                ellipse(20, -90, 6, 6);
            }
            
            fill(59, 130, 246, 100);
            rect(-40, 55, 80, 10, 5);
            rect(-30, 75, 60, 8, 4);
            
            pop();
        }
        
        async function sendMessage() {
            let input = select('#messageInput');
            let message = input.value().trim();
            
            if (message === "") return;
            
            addMessage(message, 'user');
            input.value('');
            
            isTyping = true;
            expression = "thinking";
            showTypingIndicator();
            
            try {
                let response = await fetch(`https://api.simplebot.xyz/api/v1/chat?message=${encodeURIComponent(message)}&botId=1`);
                let data = await response.json();
                
                if (data && data.response) {
                    addMessage(data.response, 'bot');
                } else {
                    addMessage("Desculpe, não consegui processar sua mensagem. Pode tentar novamente?", 'bot');
                }
            } catch (error) {
                console.error('Erro na API:', error);
                let localResponse = getLocalResponse(message);
                addMessage(localResponse, 'bot');
            }
            
            removeTypingIndicator();
            isTyping = false;
            expression = "happy";
            setTimeout(() => {
                expression = "normal";
            }, 2000);
        }
        
        function getLocalResponse(message) {
            let msg = message.toLowerCase();
            
            if (msg.includes('olá') || msg.includes('oi') || msg.includes('hey')) {
                return "Olá! Como posso ajudar você hoje? 😊";
            } else if (msg.includes('como estás') || msg.includes('como vai')) {
                return "Estou funcionando perfeitamente! Obrigado por perguntar. E você? 🤖";
            } else if (msg.includes('programação') || msg.includes('código') || msg.includes('p5')) {
                return "Adoro programação! Este dashboard foi feito com p5.js. Quer saber mais sobre? 💻";
            } else if (msg.includes('obrigado') || msg.includes('valeu')) {
                return "De nada! Fico feliz em ajudar. 🎉";
            } else if (msg.includes('tempo') || msg.includes('clima')) {
                return "Não tenho acesso a dados meteorológicos agora, mas posso conversar sobre outros assuntos! 🌤️";
            } else if (msg.includes('nome')) {
                return "Sou o Assistente IA do seu dashboard! Fui criado com p5.js e API de chatbot. 🤖";
            } else if (msg.includes('ajuda') || msg.includes('socorro')) {
                return "Claro! Posso ajudar com informações, conversar ou apenas ouvir. O que você precisa? 🆘";
            } else if (msg.includes('tchau') || msg.includes('adeus') || msg.includes('até logo')) {
                return "Até logo! Foi um prazer conversar com você. Volte sempre! 👋";
            } else if (msg.includes('piada') || msg.includes('humor')) {
                return "Por que o programador foi ao médico? Porque ele tinha muitos 'bytes'! 😂";
            } else {
                return "Interessante! Conte-me mais sobre isso. Estou aqui para aprender e conversar com você. 🗣️";
            }
        }
        
        function addMessage(text, sender) {
            let messagesDiv = select('#chatMessages');
            
            let messageDiv = createDiv('');
            messageDiv.addClass('message');
            messageDiv.addClass(sender);
            
            let avatar = createDiv('');
            avatar.addClass('message-avatar');
            avatar.html(sender === 'user' ? '👤' : '🤖');
            
            let content = createDiv('');
            content.addClass('message-content');
            content.html(text);
            
            messageDiv.child(avatar);
            messageDiv.child(content);
            messagesDiv.child(messageDiv);
            
            messagesDiv.elt.scrollTop = messagesDiv.elt.scrollHeight;
        }
        
        function showTypingIndicator() {
            let messagesDiv = select('#chatMessages');
            removeTypingIndicator();
            
            let typingDiv = createDiv('');
            typingDiv.id('typingIndicator');
            typingDiv.addClass('message');
            typingDiv.addClass('bot');
            
            let avatar = createDiv('');
            avatar.addClass('message-avatar');
            avatar.html('🤖');
            
            let indicator = createDiv('');
            indicator.addClass('typing-indicator');
            indicator.html('<span></span><span></span><span></span>');
            
            typingDiv.child(avatar);
            typingDiv.child(indicator);
            messagesDiv.child(typingDiv);
            messagesDiv.elt.scrollTop = messagesDiv.elt.scrollHeight;
        }
        
        function removeTypingIndicator() {
            let indicator = select('#typingIndicator');
            if (indicator) indicator.remove();
        }
        
        function clearChat() {
            let messagesDiv = select('#chatMessages');
            messagesDiv.html('');
            
            addMessage("Olá! Eu sou o Assistente IA. Como posso ajudar você hoje?\n\nPergunte sobre tecnologia, programação, ou converse normalmente!", 'bot');
        }
    </script>
</body>
</html>
