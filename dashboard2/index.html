<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Gallery | Imagens de Carros</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0a0a1a, #1a1a2e);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            max-width: 1100px;
            width: 100%;
        }
        
        canvas {
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            background: #1a1a2e;
        }
        
        .controls {
            flex: 1;
            min-width: 280px;
            background: rgba(15,25,45,0.95);
            border-radius: 20px;
            padding: 20px;
            color: white;
        }
        
        select, button {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            font-size: 14px;
            margin: 10px 0;
            cursor: pointer;
        }
        
        button {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            font-weight: bold;
        }
        
        .filter-btn {
            background: #334155;
            margin: 5px;
            width: auto;
            display: inline-block;
            padding: 8px 12px;
        }
        
        .filter-group {
            text-align: center;
            margin: 15px 0;
        }
        
        input[type="range"] {
            width: 100%;
            margin: 10px 0;
        }
        
        .status {
            background: #0f172a;
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
            text-align: center;
            font-size: 12px;
        }
        
        .status.success { color: #4ade80; }
        .status.error { color: #f87171; }
        .status.loading { color: #fbbf24; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <div class="container">
        <div id="canvasContainer"></div>
        <div class="controls">
            <h2>🏎️ Car Gallery</h2>
            
            <select id="brandSelect">
                <option value="audi">Audi R8</option>
                <option value="bmw">BMW M4</option>
                <option value="ferrari">Ferrari F8</option>
                <option value="lamborghini">Lamborghini</option>
                <option value="porsche">Porsche 911</option>
                <option value="mercedes">Mercedes AMG</option>
            </select>
            
            <button id="loadBtn">🔍 CARREGAR IMAGEM</button>
            
            <div class="filter-group">
                <button class="filter-btn" data-filter="pixelate">Pixelate</button>
                <button class="filter-btn" data-filter="glitch">Glitch</button>
                <button class="filter-btn" data-filter="invert">Inverter</button>
                <button class="filter-btn" data-filter="threshold">B&W</button>
                <button class="filter-btn" data-filter="emboss">Relevo</button>
                <button class="filter-btn" data-filter="edges">Bordas</button>
                <button class="filter-btn" data-filter="reset">Reset</button>
            </div>
            
            <label>🌀 Distorção: <span id="radialVal">0</span></label>
            <input type="range" id="radialSlider" min="0" max="100" value="0">
            
            <label>🌈 Saturação: <span id="satVal">100</span>%</label>
            <input type="range" id="satSlider" min="0" max="200" value="100">
            
            <label>🔆 Brilho: <span id="brightVal">0</span></label>
            <input type="range" id="brightSlider" min="-100" max="100" value="0">
            
            <div id="statusMsg" class="status">💡 Selecione uma marca e clique em CARREGAR</div>
        </div>
    </div>

    <script>
        // ============================================
        // IMAGENS DE CARROS (Pexels - CDN confiável)
        // ============================================
        const carImages = {
            audi: "https://images.pexels.com/photos/1255144/audi-car-audi-r8-audi-r8-plus-1255144.jpeg?w=500&h=400&fit=crop",
            bmw: "https://images.pexels.com/photos/290275/pexels-photo-290275.jpeg?w=500&h=400&fit=crop",
            ferrari: "https://images.pexels.com/photos/337909/ferrari-vehicle-sports-car-supercar-337909.jpeg?w=500&h=400&fit=crop",
            lamborghini: "https://images.pexels.com/photos/3802510/pexels-photo-3802510.jpeg?w=500&h=400&fit=crop",
            porsche: "https://images.pexels.com/photos/220133/pexels-photo-220133.jpeg?w=500&h=400&fit=crop",
            mercedes: "https://images.pexels.com/photos/1130036/pexels-photo-1130036.jpeg?w=500&h=400&fit=crop"
        };
        
        // ============================================
        // VARIÁVEIS GLOBAIS
        // ============================================
        let myImage = null;
        let originalPixelsCopy = null;
        let activeFilter = 'none';
        let radialValue = 0;
        let saturationValue = 100;
        let brightnessValue = 0;
        let canvasWidth = 500;
        let canvasHeight = 400;
        
        // ============================================
        // SETUP p5.js
        // ============================================
        function setup() {
            let canvas = createCanvas(canvasWidth, canvasHeight);
            canvas.parent('canvasContainer');
            background(20);
            
            textAlign(CENTER, CENTER);
            fill(150);
            textSize(14);
            text("🏎️ Clique em CARREGAR IMAGEM", width/2, height/2);
            
            // Botão de carregar
            let loadButton = select('#loadBtn');
            loadButton.mousePressed(loadCarImage);
            
            // Filtros
            let allFilters = selectAll('.filter-btn');
            for (let btn of allFilters) {
                btn.mousePressed(() => {
                    let filterType = btn.elt.dataset.filter;
                    if (filterType === 'reset') {
                        resetImage();
                    } else {
                        activeFilter = filterType;
                        applyFilters();
                    }
                });
            }
            
            // Sliders
            let radialSlider = select('#radialSlider');
            radialSlider.input(() => {
                radialValue = int(radialSlider.value());
                select('#radialVal').html(radialValue);
                applyFilters();
            });
            
            let satSlider = select('#satSlider');
            satSlider.input(() => {
                saturationValue = int(satSlider.value());
                select('#satVal').html(saturationValue);
                applyFilters();
            });
            
            let brightSlider = select('#brightSlider');
            brightSlider.input(() => {
                brightnessValue = int(brightSlider.value());
                select('#brightVal').html(brightnessValue);
                applyFilters();
            });
        }
        
        // ============================================
        // CARREGAR IMAGEM
        // ============================================
        function loadCarImage() {
            let brand = select('#brandSelect').value();
            let statusDiv = select('#statusMsg');
            let imgUrl = carImages[brand];
            
            statusDiv.html('⏳ A carregar imagem...');
            statusDiv.removeClass('success error').addClass('loading');
            
            loadImage(imgUrl, 
                (img) => {
                    // Sucesso
                    myImage = img;
                    
                    // Redimensionar
                    if (myImage.width !== canvasWidth || myImage.height !== canvasHeight) {
                        myImage.resize(canvasWidth, canvasHeight);
                    }
                    
                    // Guardar pixels originais
                    myImage.loadPixels();
                    originalPixelsCopy = [...myImage.pixels];
                    
                    statusDiv.html('✅ Imagem carregada! Use os filtros.');
                    statusDiv.removeClass('loading').addClass('success');
                    
                    // Resetar filtros
                    resetFiltersUI();
                    
                    // Mostrar imagem
                    image(myImage, 0, 0);
                },
                (err) => {
                    console.error(err);
                    statusDiv.html('❌ Erro ao carregar. Tente novamente.');
                    statusDiv.removeClass('loading').addClass('error');
                    background(20);
                    text("❌ Erro ao carregar imagem", width/2, height/2);
                }
            );
        }
        
        // ============================================
        // RESETAR INTERFACE
        // ============================================
        function resetFiltersUI() {
            activeFilter = 'none';
            radialValue = 0;
            saturationValue = 100;
            brightnessValue = 0;
            
            select('#radialSlider').value(0);
            select('#satSlider').value(100);
            select('#brightSlider').value(0);
            select('#radialVal').html('0');
            select('#satVal').html('100');
            select('#brightVal').html('0');
        }
        
        // ============================================
        // RESETAR IMAGEM
        // ============================================
        function resetImage() {
            if (!originalPixelsCopy || !myImage) {
                console.log("Sem imagem");
                return;
            }
            
            myImage.loadPixels();
            for (let i = 0; i < originalPixelsCopy.length; i++) {
                myImage.pixels[i] = originalPixelsCopy[i];
            }
            myImage.updatePixels();
            image(myImage, 0, 0);
            
            resetFiltersUI();
        }
        
        // ============================================
        // APLICAR FILTROS
        // ============================================
        function applyFilters() {
            if (!originalPixelsCopy || !myImage) {
                return;
            }
            
            // Começar com original
            myImage.loadPixels();
            for (let i = 0; i < originalPixelsCopy.length; i++) {
                myImage.pixels[i] = originalPixelsCopy[i];
            }
            
            // Aplicar filtro se necessário
            if (activeFilter !== 'none') {
                applyPixelFilterToImage();
            }
            
            // Aplicar ajustes de cor
            applyColorAdjustmentsToImage();
            
            // Aplicar distorção radial
            if (radialValue > 0) {
                applyRadialDistortionToImage();
            }
            
            myImage.updatePixels();
            image(myImage, 0, 0);
        }
        
        // ============================================
        // FILTRO DE PIXELS
        // ============================================
        function applyPixelFilterToImage() {
            myImage.loadPixels();
            
            for (let y = 0; y < canvasHeight; y++) {
                for (let x = 0; x < canvasWidth; x++) {
                    let idx = (y * canvasWidth + x) * 4;
                    let r = myImage.pixels[idx];
                    let g = myImage.pixels[idx + 1];
                    let b = myImage.pixels[idx + 2];
                    
                    if (activeFilter === 'pixelate') {
                        let pixelSize = 8;
                        let px = floor(x / pixelSize) * pixelSize;
                        let py = floor(y / pixelSize) * pixelSize;
                        let pIdx = (py * canvasWidth + px) * 4;
                        myImage.pixels[idx] = myImage.pixels[pIdx];
                        myImage.pixels[idx+1] = myImage.pixels[pIdx+1];
                        myImage.pixels[idx+2] = myImage.pixels[pIdx+2];
                    }
                    else if (activeFilter === 'glitch') {
                        if (random(1) < 0.05) {
                            let offset = int(random(-20, 20));
                            let newIdx = idx + offset * 4;
                            if (newIdx >= 0 && newIdx < myImage.pixels.length - 3) {
                                myImage.pixels[idx] = myImage.pixels[newIdx];
                                myImage.pixels[idx+1] = myImage.pixels[newIdx+1];
                                myImage.pixels[idx+2] = myImage.pixels[newIdx+2];
                            }
                        }
                    }
                    else if (activeFilter === 'invert') {
                        myImage.pixels[idx] = 255 - r;
                        myImage.pixels[idx+1] = 255 - g;
                        myImage.pixels[idx+2] = 255 - b;
                    }
                    else if (activeFilter === 'threshold') {
                        let gray = (r + g + b) / 3;
                        let val = gray > 127 ? 255 : 0;
                        myImage.pixels[idx] = val;
                        myImage.pixels[idx+1] = val;
                        myImage.pixels[idx+2] = val;
                    }
                    else if (activeFilter === 'emboss') {
                        if (x > 0 && y > 0) {
                            let prevIdx = ((y-1) * canvasWidth + (x-1)) * 4;
                            let dr = r - myImage.pixels[prevIdx];
                            let dg = g - myImage.pixels[prevIdx+1];
                            let db = b - myImage.pixels[prevIdx+2];
                            myImage.pixels[idx] = constrain(128 + dr, 0, 255);
                            myImage.pixels[idx+1] = constrain(128 + dg, 0, 255);
                            myImage.pixels[idx+2] = constrain(128 + db, 0, 255);
                        }
                    }
                    else if (activeFilter === 'edges') {
                        if (x > 0 && x < canvasWidth-1 && y > 0 && y < canvasHeight-1) {
                            let rightIdx = (y * canvasWidth + (x+1)) * 4;
                            let bottomIdx = ((y+1) * canvasWidth + x) * 4;
                            let edgeR = abs(r - myImage.pixels[rightIdx]) + abs(r - myImage.pixels[bottomIdx]);
                            let edgeG = abs(g - myImage.pixels[rightIdx+1]) + abs(g - myImage.pixels[bottomIdx+1]);
                            let edgeB = abs(b - myImage.pixels[rightIdx+2]) + abs(b - myImage.pixels[bottomIdx+2]);
                            let edge = constrain((edgeR + edgeG + edgeB) / 3, 0, 255);
                            myImage.pixels[idx] = edge;
                            myImage.pixels[idx+1] = edge;
                            myImage.pixels[idx+2] = edge;
                        }
                    }
                }
            }
            myImage.updatePixels();
        }
        
        // ============================================
        // AJUSTES DE COR
        // ============================================
        function applyColorAdjustmentsToImage() {
            myImage.loadPixels();
            
            for (let i = 0; i < myImage.pixels.length; i += 4) {
                let r = myImage.pixels[i];
                let g = myImage.pixels[i + 1];
                let b = myImage.pixels[i + 2];
                
                let gray = (r + g + b) / 3;
                let satFactor = saturationValue / 100;
                let newR = gray + (r - gray) * satFactor;
                let newG = gray + (g - gray) * satFactor;
                let newB = gray + (b - gray) * satFactor;
                
                myImage.pixels[i] = constrain(newR + brightnessValue, 0, 255);
                myImage.pixels[i + 1] = constrain(newG + brightnessValue, 0, 255);
                myImage.pixels[i + 2] = constrain(newB + brightnessValue, 0, 255);
            }
            myImage.updatePixels();
        }
        
        // ============================================
        // DISTORÇÃO RADIAL
        // ============================================
        function applyRadialDistortionToImage() {
            let newPixels = new Array(myImage.pixels.length);
            let centerX = canvasWidth / 2;
            let centerY = canvasHeight / 2;
            let maxRadius = dist(0, 0, centerX, centerY);
            let strength = radialValue / 50;
            
            for (let y = 0; y < canvasHeight; y++) {
                for (let x = 0; x < canvasWidth; x++) {
                    let dx = x - centerX;
                    let dy = y - centerY;
                    let radius = dist(x, y, centerX, centerY);
                    
                    let factor = 1 + strength * (radius / maxRadius);
                    let newX = centerX + dx * factor;
                    let newY = centerY + dy * factor;
                    
                    let srcX = floor(newX);
                    let srcY = floor(newY);
                    
                    if (srcX >= 0 && srcX < canvasWidth && srcY >= 0 && srcY < canvasHeight) {
                        let srcIdx = (srcY * canvasWidth + srcX) * 4;
                        let dstIdx = (y * canvasWidth + x) * 4;
                        newPixels[dstIdx] = myImage.pixels[srcIdx];
                        newPixels[dstIdx+1] = myImage.pixels[srcIdx+1];
                        newPixels[dstIdx+2] = myImage.pixels[srcIdx+2];
                        newPixels[dstIdx+3] = myImage.pixels[srcIdx+3];
                    }
                }
            }
            
            for (let i = 0; i < newPixels.length; i++) {
                if (newPixels[i] !== undefined) myImage.pixels[i] = newPixels[i];
            }
            myImage.updatePixels();
        }
        
        function draw() {
            // Não faz nada
        }
    </script>
</body>
</html>
