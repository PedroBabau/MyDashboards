<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Gallery | API de Carros + Carro Decorativo</title>
    <style>
        * {
            user-select: none;
        }
        
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0a0a1a, #1a1a2e, #16213e);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            max-width: 1400px;
            width: 100%;
            justify-content: center;
        }
        
        .canvas-area {
            flex: 1.2;
            min-width: 450px;
            text-align: center;
        }
        
        canvas {
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            background: #0f0f1a;
            cursor: pointer;
        }
        
        .controls {
            flex: 1;
            min-width: 320px;
            background: rgba(15, 25, 45, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: fit-content;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .controls h2 {
            margin: 0 0 5px 0;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .controls p {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #cbd5e1;
        }
        
        select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        
        button {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
        }
        
        .filter-section {
            border-top: 1px solid #334155;
            padding-top: 20px;
            margin-top: 10px;
        }
        
        .filter-section h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: #ff6b6b;
        }
        
        .filter-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .filter-btn {
            background: #334155;
            padding: 8px;
            font-size: 12px;
            margin-bottom: 0;
        }
        
        .filter-btn:hover {
            background: #475569;
            transform: none;
        }
        
        input[type="range"] {
            width: 100%;
            padding: 0;
            margin: 10px 0;
        }
        
        .value-display {
            display: inline-block;
            background: #1e293b;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
            margin-left: 8px;
        }
        
        .status {
            background: #0f172a;
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
            color: #94a3b8;
        }
        
        .status.loading {
            color: #fbbf24;
            animation: pulse 1s infinite;
        }
        
        .status.success {
            color: #4ade80;
        }
        
        .status.error {
            color: #f87171;
        }
        
        .car-info {
            background: #1e293b;
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
            font-size: 11px;
            border-left: 3px solid #ff6b6b;
            text-align: center;
        }
        
        .car-info span {
            color: #ffaa66;
            font-weight: bold;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ff6b6b;
            border-radius: 3px;
        }
        
        @media (max-width: 900px) {
            .canvas-area { min-width: 350px; }
            canvas { width: 100%; height: auto; }
            .controls { min-width: 280px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="canvas-area">
            <div id="p5canvas"></div>
        </div>
        <div class="controls">
            <h2>🏎️ Car Gallery</h2>
            <p>API de Imagens de Carros + Carro Decorativo (p5.js)</p>
            
            <div class="input-group">
                <label>🚗 Marca do Carro</label>
                <select id="brand">
                    <option value="audi">Audi</option>
                    <option value="bmw">BMW</option>
                    <option value="ferrari">Ferrari</option>
                    <option value="lamborghini">Lamborghini</option>
                    <option value="porsche">Porsche</option>
                    <option value="mercedes">Mercedes-Benz</option>
                    <option value="tesla">Tesla</option>
                    <option value="ford">Ford Mustang</option>
                    <option value="chevrolet">Chevrolet Camaro</option>
                    <option value="toyota">Toyota Supra</option>
                </select>
            </div>
            
            <button id="fetchBtn">🔍 Buscar Imagem do Carro</button>
            
            <div class="car-info" id="carInfo">
                <span>🏎️ Marca selecionada:</span> <span id="selectedBrand">Audi</span><br>
                <span>📸</span> A imagem será carregada da API (CORS ativo)
            </div>
            
            <div class="filter-section">
                <h3>🎛️ Pós-Processamento Interativo</h3>
                <div class="filter-buttons">
                    <button class="filter-btn" data-filter="pixelate">Pixelate</button>
                    <button class="filter-btn" data-filter="glitch">Glitch Art</button>
                    <button class="filter-btn" data-filter="invert">Inverter Cores</button>
                    <button class="filter-btn" data-filter="threshold">Limiar (B&W)</button>
                    <button class="filter-btn" data-filter="emboss">Relevo</button>
                    <button class="filter-btn" data-filter="edges">Detecção Bordas</button>
                    <button class="filter-btn" data-filter="reset">Resetar</button>
                </div>
                
                <div class="input-group">
                    <label>🌀 Distorção Radial <span id="radialVal" class="value-display">0</span></label>
                    <input type="range" id="radialDistort" min="0" max="100" value="0" step="1">
                </div>
                
                <div class="input-group">
                    <label>🌈 Saturação <span id="satVal" class="value-display">100%</span></label>
                    <input type="range" id="saturation" min="0" max="200" value="100" step="1">
                </div>
                
                <div class="input-group">
                    <label>🔆 Brilho <span id="brightVal" class="value-display">0</span></label>
                    <input type="range" id="brightness" min="-100" max="100" value="0" step="1">
                </div>
            </div>
            
            <div class="status" id="status">
                💡 Selecione uma marca e clique em "Buscar Imagem do Carro"!
            </div>
        </div>
    </div>
    
    <script>
        let currentImage = null;
        let originalPixels = null;
        let currentFilter = 'none';
        let radialAmount = 0;
        let saturationAmount = 100;
        let brightnessAmount = 0;
        let currentBrand = "audi";
        
        // Mapeamento de marcas para termos de busca na API
        const brandSearchTerms = {
            audi: "Audi R8",
            bmw: "BMW M4",
            ferrari: "Ferrari F8",
            lamborghini: "Lamborghini Huracan",
            porsche: "Porsche 911",
            mercedes: "Mercedes AMG GT",
            tesla: "Tesla Model S",
            ford: "Ford Mustang GT",
            chevrolet: "Chevrolet Camaro",
            toyota: "Toyota Supra"
        };
        
        // API de imagens - ImgFlip (memes de carros, CORS ativo)
        // Fallback: Unsplash via proxy CORS gratuito
        
        async function fetchCarImage() {
            currentBrand = select('#brand').value();
            let brandName = select('#brand').options[select('#brand').selectedIndex].text;
            let statusDiv = select('#status');
            
            select('#selectedBrand').html(brandName);
            
            statusDiv.html('🏎️ Buscando imagem... ⏳');
            statusDiv.removeClass('success').removeClass('error').addClass('loading');
            
            // Tentativa 1: API do Unsplash via proxy CORS (gratuito e confiável)
            let searchTerm = brandSearchTerms[currentBrand];
            let proxyUrl = 'https://corsproxy.io/?';
            let unsplashUrl = `https://unsplash.com/napi/search/photos?query=${encodeURIComponent(searchTerm + " car")}&per_page=20`;
            
            try {
                // Usando CORS proxy gratuito
                let response = await fetch(proxyUrl + encodeURIComponent(unsplashUrl), {
                    headers: { 'Accept': 'application/json' }
                });
                
                if (response.ok) {
                    let data = await response.json();
                    if (data && data.results && data.results.length > 0) {
                        // Escolher uma imagem aleatória dos resultados
                        let randomIndex = Math.floor(Math.random() * Math.min(data.results.length, 10));
                        let imageUrl = data.results[randomIndex].urls.regular;
                        loadImage(imageUrl, 
                            (img) => {
                                displayImage(img, statusDiv);
                            },
                            () => {
                                useFallbackImage(statusDiv);
                            }
                        );
                        return;
                    }
                }
                throw new Error('API falhou');
            } catch (error) {
                console.log('Unsplash via proxy falhou, tentando fallback...', error);
                useFallbackImage(statusDiv);
            }
        }
        
        function useFallbackImage(statusDiv) {
            // Fallback: imagens SVG de carros (garantidas, sem rede)
            let fallbackImages = {
                audi: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 250'%3E%3Crect width='400' height='250' fill='%231a2a4a'/%3E%3Crect x='80' y='100' width='240' height='80' rx='15' fill='%230064ff'/%3E%3Crect x='130' y='70' width='140' height='40' rx='8' fill='%234477cc'/%3E%3Ccircle cx='140' cy='200' r='25' fill='%23222222'/%3E%3Ccircle cx='260' cy='200' r='25' fill='%23222222'/%3E%3Ctext x='200' y='145' text-anchor='middle' fill='white' font-size='24' font-family='monospace'%3EAUDI%3C/text%3E%3C/svg%3E",
                bmw: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 250'%3E%3Crect width='400' height='250' fill='%231a2a4a'/%3E%3Crect x='80' y='100' width='240' height='80' rx='15' fill='%2300aaff'/%3E%3Crect x='130' y='70' width='140' height='40' rx='8' fill='%230088cc'/%3E%3Ccircle cx='140' cy='200' r='25' fill='%23222222'/%3E%3Ccircle cx='260' cy='200' r='25' fill='%23222222'/%3E%3Ctext x='200' y='145' text-anchor='middle' fill='white' font-size='24' font-family='monospace'%3EBMW%3C/text%3E%3C/svg%3E",
                ferrari: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 250'%3E%3Crect width='400' height='250' fill='%231a2a4a'/%3E%3Crect x='80' y='100' width='240' height='80' rx='15' fill='%23ff3300'/%3E%3Crect x='130' y='70' width='140' height='40' rx='8' fill='%23cc2200'/%3E%3Ccircle cx='140' cy='200' r='25' fill='%23222222'/%3E%3Ccircle cx='260' cy='200' r='25' fill='%23222222'/%3E%3Ctext x='200' y='145' text-anchor='middle' fill='yellow' font-size='20' font-family='monospace'%3EFERRARI%3C/text%3E%3C/svg%3E",
                lamborghini: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 250'%3E%3Crect width='400' height='250' fill='%231a2a4a'/%3E%3Crect x='80' y='100' width='240' height='80' rx='15' fill='%23ffcc00'/%3E%3Crect x='130' y='70' width='140' height='40' rx='8' fill='%23cc9900'/%3E%3Ccircle cx='140' cy='200' r='25' fill='%23222222'/%3E%3Ccircle cx='260' cy='200' r='25' fill='%23222222'/%3E%3Ctext x='200' y='145' text-anchor='middle' fill='black' font-size='18' font-family='monospace'%3ELAMBORGHINI%3C/text%3E%3C/svg%3E"
            };
            
            let fallbackSvg = fallbackImages[currentBrand] || fallbackImages.audi;
            loadImage(fallbackSvg, 
                (img) => {
                    displayImage(img, statusDiv);
                    statusDiv.html('⚠️ Modo Demo - Imagem SVG de fallback');
                },
                () => {
                    statusDiv.html('❌ Erro total. Tente recarregar.');
                    statusDiv.removeClass('loading').addClass('error');
                }
            );
        }
        
        function displayImage(img, statusDiv) {
            currentImage = img;
            if (currentImage.width !== width || currentImage.height !== height) {
                currentImage.resize(width, height);
            }
            
            currentImage.loadPixels();
            originalPixels = [...currentImage.pixels];
            
            statusDiv.html('✅ Imagem carregada! Use os filtros abaixo.');
            statusDiv.removeClass('loading').addClass('success');
            
            // Resetar efeitos
            currentFilter = 'none';
            radialAmount = 0;
            saturationAmount = 100;
            brightnessAmount = 0;
            select('#radialDistort').value(0);
            select('#saturation').value(100);
            select('#brightness').value(0);
            select('#radialVal').html('0');
            select('#satVal').html('100%');
            select('#brightVal').html('0');
            
            // Desenhar no canvas principal
            drawCarOnCanvas();
        }
        
        function drawCarOnCanvas() {
            if (!currentImage) return;
            
            // Criar um buffer para combinar a imagem do carro com o carro decorativo
            let buffer = createGraphics(width, height);
            
            // Desenhar a imagem do carro
            buffer.image(currentImage, 0, 0, width, height);
            
            // Desenhar o carro decorativo p5.js no canto inferior direito
            drawDecorativeCar(buffer);
            
            // Atualizar a imagem principal
            carImage = buffer.get();
            carImage.loadPixels();
            originalPixels = [...carImage.pixels];
            image(carImage, 0, 0);
        }
        
        function drawDecorativeCar(g) {
            // Carro desportivo decorativo (apenas estilístico)
            g.push();
            
            // Posição: canto inferior direito
            let carX = g.width - 140;
            let carY = g.height - 100;
            
            // Sombra
            g.fill(0, 0, 0, 80);
            g.noStroke();
            g.ellipse(carX + 50, carY + 35, 100, 15);
            
            // Corpo principal
            g.fill(255, 100, 50);
            g.rect(carX, carY, 100, 40, 10);
            
            // Teto
            g.fill(200, 70, 30);
            g.rect(carX + 25, carY - 15, 50, 20, 8);
            
            // Janelas
            g.fill(100, 150, 200);
            g.rect(carX + 30, carY - 12, 18, 12, 3);
            g.rect(carX + 52, carY - 12, 18, 12, 3);
            
            // Rodas
            g.fill(30, 30, 30);
            g.ellipse(carX + 25, carY + 35, 25, 25);
            g.ellipse(carX + 75, carY + 35, 25, 25);
            g.fill(80, 80, 90);
            g.ellipse(carX + 25, carY + 35, 15, 15);
            g.ellipse(carX + 75, carY + 35, 15, 15);
            
            // Faróis
            g.fill(255, 255, 150);
            g.ellipse(carX + 95, carY + 20, 10, 8);
            g.fill(255, 100, 50);
            g.ellipse(carX + 5, carY + 20, 10, 8);
            
            // Spoiler
            g.fill(200, 70, 30);
            g.rect(carX + 20, carY - 22, 60, 6, 3);
            
            // Detalhe da marca
            g.fill(255, 215, 0);
            g.ellipse(carX + 50, carY + 20, 12, 12);
            g.fill(0);
            g.ellipse(carX + 50, carY + 20, 6, 6);
            
            g.pop();
        }
        
        function resetImage() {
            if (!originalPixels || !carImage) return;
            
            carImage.loadPixels();
            for (let i = 0; i < originalPixels.length; i++) {
                carImage.pixels[i] = originalPixels[i];
            }
            carImage.updatePixels();
            image(carImage, 0, 0);
            
            radialAmount = 0;
            saturationAmount = 100;
            brightnessAmount = 0;
            currentFilter = 'none';
            select('#radialDistort').value(0);
            select('#saturation').value(100);
            select('#brightness').value(0);
            select('#radialVal').html('0');
            select('#satVal').html('100%');
            select('#brightVal').html('0');
        }
        
        function applyFilters() {
            if (!carImage || !originalPixels) return;
            
            carImage.loadPixels();
            for (let i = 0; i < originalPixels.length; i++) {
                carImage.pixels[i] = originalPixels[i];
            }
            
            if (currentFilter !== 'none') {
                applyPixelFilter();
            }
            
            applyColorAdjustments();
            
            if (radialAmount > 0) {
                applyRadialDistortion();
            }
            
            carImage.updatePixels();
            image(carImage, 0, 0);
        }
        
        function applyPixelFilter() {
            carImage.loadPixels();
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    let idx = (y * width + x) * 4;
                    let r = carImage.pixels[idx];
                    let g = carImage.pixels[idx + 1];
                    let b = carImage.pixels[idx + 2];
                    
                    switch(currentFilter) {
                        case 'pixelate':
                            let pixelSize = 8;
                            let px = floor(x / pixelSize) * pixelSize;
                            let py = floor(y / pixelSize) * pixelSize;
                            let pIdx = (py * width + px) * 4;
                            carImage.pixels[idx] = carImage.pixels[pIdx];
                            carImage.pixels[idx + 1] = carImage.pixels[pIdx + 1];
                            carImage.pixels[idx + 2] = carImage.pixels[pIdx + 2];
                            break;
                            
                        case 'glitch':
                            if (random(1) < 0.05) {
                                let offset = int(random(-20, 20));
                                let newIdx = idx + offset * 4;
                                if (newIdx >= 0 && newIdx < carImage.pixels.length - 3) {
                                    carImage.pixels[idx] = carImage.pixels[newIdx];
                                    carImage.pixels[idx + 1] = carImage.pixels[newIdx + 1];
                                    carImage.pixels[idx + 2] = carImage.pixels[newIdx + 2];
                                }
                            }
                            break;
                            
                        case 'invert':
                            carImage.pixels[idx] = 255 - r;
                            carImage.pixels[idx + 1] = 255 - g;
                            carImage.pixels[idx + 2] = 255 - b;
                            break;
                            
                        case 'threshold':
                            let gray = (r + g + b) / 3;
                            let val = gray > 127 ? 255 : 0;
                            carImage.pixels[idx] = val;
                            carImage.pixels[idx + 1] = val;
                            carImage.pixels[idx + 2] = val;
                            break;
                            
                        case 'emboss':
                            if (x > 0 && y > 0) {
                                let prevIdx = ((y-1) * width + (x-1)) * 4;
                                let dr = r - carImage.pixels[prevIdx];
                                let dg = g - carImage.pixels[prevIdx + 1];
                                let db = b - carImage.pixels[prevIdx + 2];
                                carImage.pixels[idx] = constrain(128 + dr, 0, 255);
                                carImage.pixels[idx + 1] = constrain(128 + dg, 0, 255);
                                carImage.pixels[idx + 2] = constrain(128 + db, 0, 255);
                            }
                            break;
                            
                        case 'edges':
                            if (x > 0 && x < width-1 && y > 0 && y < height-1) {
                                let rightIdx = (y * width + (x+1)) * 4;
                                let bottomIdx = ((y+1) * width + x) * 4;
                                let edgeR = abs(r - carImage.pixels[rightIdx]) + abs(r - carImage.pixels[bottomIdx]);
                                let edgeG = abs(g - carImage.pixels[rightIdx+1]) + abs(g - carImage.pixels[bottomIdx+1]);
                                let edgeB = abs(b - carImage.pixels[rightIdx+2]) + abs(b - carImage.pixels[bottomIdx+2]);
                                let edge = constrain((edgeR + edgeG + edgeB) / 3, 0, 255);
                                carImage.pixels[idx] = edge;
                                carImage.pixels[idx+1] = edge;
                                carImage.pixels[idx+2] = edge;
                            }
                            break;
                    }
                }
            }
            carImage.updatePixels();
        }
        
        function applyColorAdjustments() {
            carImage.loadPixels();
            
            for (let i = 0; i < carImage.pixels.length; i += 4) {
                let r = carImage.pixels[i];
                let g = carImage.pixels[i + 1];
                let b = carImage.pixels[i + 2];
                
                let gray = (r + g + b) / 3;
                let satFactor = saturationAmount / 100;
                let newR = gray + (r - gray) * satFactor;
                let newG = gray + (g - gray) * satFactor;
                let newB = gray + (b - gray) * satFactor;
                
                carImage.pixels[i] = constrain(newR + brightnessAmount, 0, 255);
                carImage.pixels[i + 1] = constrain(newG + brightnessAmount, 0, 255);
                carImage.pixels[i + 2] = constrain(newB + brightnessAmount, 0, 255);
            }
            carImage.updatePixels();
        }
        
        function applyRadialDistortion() {
            if (radialAmount === 0) return;
            
            carImage.loadPixels();
            let distorted = new Array(carImage.pixels.length);
            let centerX = width / 2;
            let centerY = height / 2;
            let maxRadius = dist(0, 0, centerX, centerY);
            let strength = radialAmount / 50;
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    let dx = x - centerX;
                    let dy = y - centerY;
                    let radius = dist(x, y, centerX, centerY);
                    
                    let factor = 1 + strength * (radius / maxRadius);
                    let newX = centerX + dx * factor;
                    let newY = centerY + dy * factor;
                    
                    let srcX = floor(newX);
                    let srcY = floor(newY);
                    
                    if (srcX >= 0 && srcX < width && srcY >= 0 && srcY < height) {
                        let srcIdx = (srcY * width + srcX) * 4;
                        let dstIdx = (y * width + x) * 4;
                        distorted[dstIdx] = carImage.pixels[srcIdx];
                        distorted[dstIdx + 1] = carImage.pixels[srcIdx + 1];
                        distorted[dstIdx + 2] = carImage.pixels[srcIdx + 2];
                    }
                }
            }
            
            for (let i = 0; i < distorted.length; i++) {
                if (distorted[i] !== undefined) carImage.pixels[i] = distorted[i];
            }
            carImage.updatePixels();
        }
        
        function setup() {
            let canvas = createCanvas(500, 400);
            canvas.parent('p5canvas');
            background(20);
            
            textAlign(CENTER, CENTER);
            fill(150);
            textSize(14);
            text("🏎️ Selecione uma marca\n e clique em 'Buscar Imagem'", width/2, height/2);
            
            // Event listeners
            select('#fetchBtn').mousePressed(() => {
                fetchCarImage().then(() => {
                    if (currentImage) drawCarOnCanvas();
                });
            });
            
            selectAll('.filter-btn').forEach(btn => {
                btn.mousePressed(() => {
                    currentFilter = btn.elt.dataset.filter;
                    if (currentFilter === 'reset') {
                        resetImage();
                    } else {
                        applyFilters();
                    }
                });
            });
            
            select('#radialDistort').input(() => {
                radialAmount = int(select('#radialDistort').value());
                select('#radialVal').html(radialAmount);
                applyFilters();
            });
            
            select('#saturation').input(() => {
                saturationAmount = int(select('#saturation').value());
                select('#satVal').html(saturationAmount + '%');
                applyFilters();
            });
            
            select('#brightness').input(() => {
                brightnessAmount = int(select('#brightness').value());
                select('#brightVal').html(brightnessAmount);
                applyFilters();
            });
        }
        
        function draw() {
            // O desenho é feito nos callbacks
        }
    </script>
</body>
</html>
