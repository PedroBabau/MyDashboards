<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Explorer | Dados Interativos</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0a0a1a, #1a1a2e);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            max-width: 1000px;
            width: 100%;
            justify-content: center;
            position: relative;
        }
        
        canvas {
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            background: #1a1a2e;
        }
        
        .controls {
            flex: 1;
            min-width: 280px;
            background: rgba(15,25,45,0.95);
            border-radius: 20px;
            padding: 20px;
            color: white;
        }
        
        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            font-weight: bold;
            font-size: 16px;
            margin: 10px 0;
            cursor: pointer;
        }
        
        button:hover {
            transform: translateY(-2px);
            transition: 0.2s;
        }
        
        .info-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
            border-left: 3px solid #ff6b6b;
        }
        
        .info-card h3 {
            margin: 0 0 10px 0;
            color: #ffaa66;
        }
        
        .info-card p {
            margin: 5px 0;
            color: #cbd5e1;
            font-size: 14px;
        }
        
        input[type="range"] {
            width: 100%;
            margin: 10px 0;
            cursor: pointer;
        }
        
        .status {
            background: #0f172a;
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
            text-align: center;
            font-size: 12px;
        }
        
        h2 {
            margin: 0 0 5px 0;
        }
        
        p {
            color: #94a3b8;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }

        /* Botão Home */
        .btn-home {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 24px;
            border-radius: 30px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .btn-home:hover {
            background: rgba(255, 107, 107, 0.3);
            border-color: #ff6b6b;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.2);
        }

        .btn-home::before {
            content: "←";
            font-size: 20px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
    <a href="../index.html" class="btn-home">INÍCIO</a>

    <div class="container">
        <div id="canvasContainer"></div>
        <div class="controls">
            <h2>🎨 API Explorer</h2>
            <p>Dados de utilizadores via API gratuita</p>
            
            <button id="loadBtn">🔍 CARREGAR NOVO UTILIZADOR</button>
            
            <div id="infoDisplay" class="info-card">
                <h3>📋 Clique no botão acima</h3>
                <p>Para carregar dados de um utilizador aleatório</p>
            </div>
            
            <label>🎨 Cor do Avatar: <span id="colorVal">100</span></label>
            <input type="range" id="colorSlider" min="0" max="360" value="200" step="1">
            
            <label>🔵 Tamanho do Avatar: <span id="sizeVal">80</span>px</label>
            <input type="range" id="sizeSlider" min="40" max="150" value="80" step="1">
            
            <div id="statusMsg" class="status" style="color: #94a3b8;">💡 Clique em "CARREGAR NOVO UTILIZADOR"</div>
        </div>
    </div>

    <script>
        // ============================================
        // VARIÁVEIS
        // ============================================
        let currentUser = null;
        let canvasW = 400;
        let canvasH = 400;
        let avatarColor = 200;
        let avatarSize = 80;
        
        // ============================================
        // SETUP
        // ============================================
        function setup() {
            let canvas = createCanvas(canvasW, canvasH);
            canvas.parent('canvasContainer');
            background(20);
            
            textAlign(CENTER, CENTER);
            fill(150);
            textSize(14);
            text("🎨 Clique em CARREGAR", width/2, height/2);
            
            // Botão
            let btn = select('#loadBtn');
            btn.mousePressed(loadRandomUser);
            
            // Sliders
            let colorSlider = select('#colorSlider');
            colorSlider.input(() => {
                avatarColor = int(colorSlider.value());
                select('#colorVal').html(avatarColor);
                drawAvatar();
            });
            
            let sizeSlider = select('#sizeSlider');
            sizeSlider.input(() => {
                avatarSize = int(sizeSlider.value());
                select('#sizeVal').html(avatarSize);
                drawAvatar();
            });
        }
        
        function setStatus(text, color) {
            let div = select('#statusMsg');
            div.html(text);
            div.style('color', color);
        }
        
        // ============================================
        // CARREGAR DADOS DA API
        // ============================================
        async function loadRandomUser() {
            setStatus('⏳ A carregar dados da API...', '#fbbf24');
            
            // API gratuita e pública (JSONPlaceholder - CORS ativo)
            let userId = floor(random(1, 11)); // IDs de 1 a 10
            let url = `https://jsonplaceholder.typicode.com/users/${userId}`;
            
            try {
                let response = await fetch(url);
                let data = await response.json();
                
                currentUser = data;
                
                // Atualizar informação na interface
                let infoDiv = select('#infoDisplay');
                infoDiv.html(`
                    <h3>👤 ${currentUser.name}</h3>
                    <p>📧 ${currentUser.email}</p>
                    <p>🏙️ ${currentUser.address.city}</p>
                    <p>📞 ${currentUser.phone}</p>
                    <p>🏢 ${currentUser.company.name}</p>
                `);
                
                setStatus('✅ Dados carregados! Interaja com os sliders.', '#4ade80');
                
                // Desenhar avatar
                drawAvatar();
                
            } catch (error) {
                console.error(error);
                setStatus('❌ Erro ao carregar. Tente novamente.', '#f87171');
            }
        }
        
        // ============================================
        // DESENHAR AVATAR NO CANVAS
        // ============================================
        function drawAvatar() {
            if (!currentUser) {
                background(20);
                textAlign(CENTER, CENTER);
                fill(150);
                text("Clique em CARREGAR", width/2, height/2);
                return;
            }
            
            background(20);
            
            // Usar a primeira letra do nome como avatar
            let firstLetter = currentUser.name.charAt(0).toUpperCase();
            
            // Desenhar círculo (avatar)
            colorMode(HSB, 360, 100, 100);
            fill(avatarColor, 70, 80);
            noStroke();
            ellipse(width/2, height/2, avatarSize, avatarSize);
            
            // Desenhar texto
            colorMode(RGB);
            fill(255);
            textSize(avatarSize * 0.5);
            textAlign(CENTER, CENTER);
            text(firstLetter, width/2, height/2);
            
            // Reset color mode
            colorMode(RGB);
        }
        
        function draw() {
            // O desenho principal é feito no drawAvatar() chamado pelos eventos
            // Mas precisamos redesenhar quando a janela redimensionar?
        }
    </script>
</body>
</html>
